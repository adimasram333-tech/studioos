<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Event Photos</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}
.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body class="text-white min-h-screen p-4">

<div class="max-w-md mx-auto mt-24">

<div class="glass rounded-2xl p-6">

<h2 class="text-center text-lg font-semibold mb-6">
Upload Event Photos
</h2>

<select id="eventSelect"
class="w-full bg-[#0f172a] border border-gray-600 rounded-xl p-2 mb-3 text-sm">
<option value="">Select Event</option>
<option value="create_new">+ Create New Event</option>
</select>

<div id="createEventBox" style="display:none;" class="mb-4">

<input
type="text"
id="manualEventName"
placeholder="Enter Event Name"
class="w-full bg-[#0f172a] border border-gray-600 rounded-xl p-2 mb-2 text-sm"
/>

<input
type="date"
id="manualEventDate"
class="w-full bg-[#0f172a] border border-gray-600 rounded-xl p-2 text-sm"
/>

<button
type="button"
id="createEventBtn"
onclick="createManualEvent()"
class="w-full mt-3 bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-xl text-sm font-medium">
Create Event
</button>

</div>

<input
type="file"
id="images"
multiple
accept="image/*"
class="w-full bg-[#0f172a] border border-gray-600 rounded-xl p-2 mb-4 text-sm"
/>

<div class="flex gap-2 mb-4">

<button onclick="selectFolder()"
class="flex-1 bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded-xl text-xs">
Select Folder
</button>

<button onclick="selectImages()"
class="flex-1 bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded-xl text-xs">
Select Images
</button>

</div>

<button onclick="handleUpload()"
class="w-full bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-xl text-sm font-medium">
Upload Photos
</button>

<p id="status" class="text-center text-sm mt-3 text-gray-400">
Please select event and images
</p>

<div id="progress" class="text-center text-sm mt-2 text-green-400"></div>

</div>

</div>

<script>

// =============================
// SELECT INPUT CONTROL
// =============================

function selectFolder(){
const input = document.getElementById("images")
if(!input) return
input.setAttribute("webkitdirectory","")
input.click()
}

function selectImages(){
const input = document.getElementById("images")
if(!input) return
input.removeAttribute("webkitdirectory")
input.click()
}

// =============================
// GET EVENT FROM URL
// =============================

function getEventFromURL(){
const params = new URLSearchParams(window.location.search)
return params.get("event_id") || params.get("event")
}

let manualEventCreateInFlight = false

function setStatusMessage(message, colorClass = "text-gray-400"){
const status = document.getElementById("status")
if(!status) return
status.className = `text-center text-sm mt-3 ${colorClass}`
status.innerText = message
}

async function createManualEvent(){

if(manualEventCreateInFlight){
return
}

const supabase = await window.getSupabase()
const user = await window.getCurrentUser()

if(!user){
alert("Login required")
return
}

const select = document.getElementById("eventSelect")
const createBtn = document.getElementById("createEventBtn")
const createBox = document.getElementById("createEventBox")
const nameInput = document.getElementById("manualEventName")
const dateInput = document.getElementById("manualEventDate")

if(select.value !== "create_new"){
setStatusMessage("Select Create New Event first", "text-amber-400")
return
}

const name = nameInput.value.trim()
const date = dateInput.value

if(!name || !date){
alert("Enter event name and date")
return
}

try{

manualEventCreateInFlight = true
createBtn.disabled = true
createBtn.innerText = "Creating Event..."
setStatusMessage("Creating event...", "text-indigo-300")

const { data, error } =
await supabase
.from("events")
.insert([{
user_id: user.id,
client_name: name,
event_name: name,
event_type: name,
event_date: date,
status: "active"
}])
.select()
.single()

if(error){
alert("Event create failed")
return
}

const token =
Math.random().toString(36).substring(2,10).toUpperCase()

await supabase
.from("event_tokens")
.insert([{
event_id: data.id,
token: token,
used: false
}])

select.value = String(data.id)
createBox.style.display = "none"
nameInput.value = ""
dateInput.value = ""

setStatusMessage("Event created successfully. Now select images and upload.", "text-green-400")

}catch(err){
alert("Event create failed")
}finally{
manualEventCreateInFlight = false
createBtn.disabled = false
createBtn.innerText = "Create Event"
}
}

// =============================
// HANDLE UPLOAD FLOW
// =============================

async function handleUpload(){

const user = await window.getCurrentUser()

if(!user){
alert("Login required")
return
}

const select = document.getElementById("eventSelect")
const imagesInput = document.getElementById("images")

let eventId = select.value

if(!eventId){
eventId = getEventFromURL()
}

if(!eventId){
alert("Please select event")
return
}

if(!imagesInput || !imagesInput.files || !imagesInput.files.length){
alert("Please select images or folder")
return
}

setStatusMessage("Starting upload...", "text-indigo-300")

await window.uploadImages(eventId)

}

</script>

<script src="js/supabase.js"></script>
<script src="js/gallery-upload.js?v=2"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Event Photos</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body class="text-white min-h-screen p-4">

<div class="max-w-md mx-auto mt-24">

<div class="glass rounded-2xl p-6">

<h2 class="text-center text-lg font-semibold mb-6">
Upload Event Photos
</h2>

<select id="eventSelect"
class="w-full bg-[#0f172a] border border-gray-600 rounded-xl p-2 mb-3 text-sm">
<option value="">Select Event</option>
</select>

<div id="createEventBox" style="display:none;" class="mb-4">

<input
type="text"
id="manualEventName"
placeholder="Enter Event Name"
class="w-full bg-[#0f172a] border border-gray-600 rounded-xl p-2 mb-2 text-sm"
/>

<input
type="date"
id="manualEventDate"
class="w-full bg-[#0f172a] border border-gray-600 rounded-xl p-2 text-sm"
/>

</div>

<input
type="file"
id="images"
multiple
accept="image/*"
class="w-full bg-[#0f172a] border border-gray-600 rounded-xl p-2 mb-4 text-sm"
/>

<div class="flex gap-2 mb-4">

<button onclick="selectFolder()"
class="flex-1 bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded-xl text-xs">
Select Folder
</button>

<button onclick="selectImages()"
class="flex-1 bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded-xl text-xs">
Select Images
</button>

</div>

<button onclick="handleUpload()"
class="w-full bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-xl text-sm font-medium">
Upload Photos
</button>

<p id="status" class="text-center text-sm mt-3 text-gray-400">
Please select event and images
</p>

<div id="progress" class="text-center text-sm mt-2 text-green-400"></div>

</div>

</div>

<script>

// =============================
// SELECT INPUT CONTROL
// =============================

function selectFolder(){
const input = document.getElementById("images")
if(!input) return
input.setAttribute("webkitdirectory","")
input.click()
}

function selectImages(){
const input = document.getElementById("images")
if(!input) return
input.removeAttribute("webkitdirectory")
input.click()
}


// =============================
// 🔥 GET EVENT FROM URL (FIXED)
// =============================

function getEventFromURL(){
const params = new URLSearchParams(window.location.search)
return params.get("event_id") // ✅ FIXED
}


// =============================
// LOAD EVENTS INTO DROPDOWN
// =============================

async function loadEventOptions(){

const supabase = await window.getSupabase()
const user = await window.getCurrentUser()

if(!user) return

const { data } =
await supabase
.from("events")
.select("*")
.eq("user_id",user.id)
.eq("status","active")
.order("created_at",{ascending:false})

const select = document.getElementById("eventSelect")

if(!select) return

select.innerHTML = `<option value="">Select Event</option>`

data?.forEach(e=>{
const option = document.createElement("option")
option.value = String(e.id)
option.textContent = `${e.client_name} (${e.event_date})`
select.appendChild(option)
})

// CREATE OPTION
const createOption = document.createElement("option")
createOption.value = "create_new"
createOption.textContent = "+ Create New Event"
select.appendChild(createOption)


// =============================
// 🔥 AUTO SELECT FROM URL ONLY
// =============================

const urlEvent = getEventFromURL()

if(urlEvent){
select.value = String(urlEvent)
}

}


// =============================
// SHOW / HIDE CREATE EVENT BOX
// =============================

document.addEventListener("change", function(e){

if(e.target.id === "eventSelect"){

const value = e.target.value
const box = document.getElementById("createEventBox")

if(value === "create_new"){
box.style.display = "block"
}else{
box.style.display = "none"
}

}

})


// =============================
// HANDLE UPLOAD FLOW (FIXED)
// =============================

async function handleUpload(){

const supabase = await window.getSupabase()
const user = await window.getCurrentUser()

if(!user){
alert("Login required")
return
}

const select = document.getElementById("eventSelect")

let eventId = select.value

// ✅ fallback URL ONLY
if(!eventId){
eventId = getEventFromURL()
}

if(eventId === "create_new"){

const name = document.getElementById("manualEventName").value.trim()
const date = document.getElementById("manualEventDate").value

if(!name || !date){
alert("Enter event name and date")
return
}

const { data, error } =
await supabase
.from("events")
.insert([{
user_id: user.id,
client_name: name,
event_name: name,
event_type: name,
event_date: date,
status: "active"
}])
.select()
.single()

if(error){
alert("Event create failed")
return
}

eventId = data.id

}

if(!eventId){
alert("Please select event")
return
}

// ✅ CALL UPLOAD
await window.uploadImages()

// ✅ REDIRECT BACK (CRITICAL FIX)
window.location.href = `gallery.html?event_id=${eventId}`

}


// =============================
// INIT
// =============================

document.addEventListener("DOMContentLoaded", function(){
setTimeout(loadEventOptions,500)
})

</script>

<script src="js/cloudinary.js"></script>
<script src="js/supabase.js"></script>
<script src="js/gallery-upload.js"></script>

</body>
</html>

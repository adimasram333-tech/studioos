<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Profile - StudioOS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

input, select{
background: rgba(255,255,255,0.08);
color:white;
}

select option{
background:#0f172a;
color:white;
}

</style>

</head>

<body class="text-white min-h-screen p-4">

<div class="max-w-md mx-auto">

<a href="dashboard.html" class="text-sm text-gray-400">← Back</a>

<h1 class="text-2xl font-bold mb-6 mt-4">Studio Profile</h1>

<div class="glass rounded-2xl p-6 space-y-4">

<input id="studioName" class="w-full p-3 rounded-xl" placeholder="Studio Name"/>
<input id="ownerName" class="w-full p-3 rounded-xl" placeholder="Photographer Name"/>
<input id="phone" class="w-full p-3 rounded-xl" placeholder="Phone Number"/>
<input id="upi" class="w-full p-3 rounded-xl" placeholder="UPI ID (example@upi)"/>
<input id="address" class="w-full p-3 rounded-xl" placeholder="Studio Address"/>
<input id="gst" class="w-full p-3 rounded-xl" placeholder="GST (Optional)"/>

<label class="text-sm text-gray-400">Select Proposal Theme</label>

<select id="theme" class="w-full p-3 rounded-xl">

<option value="gold">Gold Luxury</option>
<option value="emerald">Emerald Premium</option>
<option value="royal">Royal Dark</option>

</select>

<button id="saveBtn"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-xl font-semibold transition">
Save Profile
</button>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>


<script>

// ============================
// SAVE PROFILE
// ============================

document.getElementById("saveBtn").addEventListener("click", saveProfile)

async function saveProfile(){

const { data: userData } =
await supabase.auth.getUser()

const user = userData.user

if(!user){

alert("User not logged in")
return

}

const profile = {

user_id: user.id,

studio_name:
document.getElementById("studioName").value.trim(),

owner_name:
document.getElementById("ownerName").value.trim(),

phone:
document.getElementById("phone").value.trim(),

upi:
document.getElementById("upi").value.trim(),

address:
document.getElementById("address").value.trim(),

gst:
document.getElementById("gst").value.trim(),

theme:
document.getElementById("theme").value

}

if(!profile.studio_name){

alert("Studio Name is required")
return

}


const { error } = await supabase
.from("photographer_settings")
.upsert(profile)


if(error){

alert("Error saving profile")
console.error(error)
return

}

window.location.href="dashboard.html"

}



// ============================
// LOAD PROFILE
// ============================

async function loadProfile(){

const { data: userData } =
await supabase.auth.getUser()

const user = userData.user

if(!user) return


const { data } =
await supabase
.from("photographer_settings")
.select("*")
.eq("user_id", user.id)
.single()


if(data){

document.getElementById("studioName").value = data.studio_name || ""
document.getElementById("ownerName").value = data.owner_name || ""
document.getElementById("phone").value = data.phone || ""
document.getElementById("upi").value = data.upi || ""
document.getElementById("address").value = data.address || ""
document.getElementById("gst").value = data.gst || ""

document.getElementById("theme").value =
data.theme || "gold"

}

}

loadProfile()

</script>

</body>
</html>

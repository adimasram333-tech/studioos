<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Access Gallery</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ✅ FIXED: ensure proper load -->
  <script defer src="./js/supabase.js"></script>

  <!-- DEBUG -->
  <script>
    window.addEventListener("error", function (e) {
      console.error("Global JS Error:", e.message);
      alert("System error occurred. Please refresh.");
    });

    // 🚨 VALIDATE EVENT ID EARLY
    (function () {
      const params = new URLSearchParams(window.location.search);
      const eventId = params.get("event_id");

      if (!eventId) {
        document.body.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#111;color:white;font-family:sans-serif">
            <div style="text-align:center">
              <h2 style="font-size:20px;margin-bottom:10px">Invalid Link</h2>
              <p>This gallery link is not valid.</p>
            </div>
          </div>
        `;
      }
    })();
  </script>

</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6">
      Enter Details to View Gallery
    </h2>

    <form id="accessForm" class="space-y-4">

      <input 
        type="text"
        id="name"
        placeholder="Your Name"
        class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600"
        required
      >

      <input 
        type="tel"
        id="phone"
        placeholder="Mobile Number"
        class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600"
        required
      >

      <button 
        type="submit"
        id="submitBtn"
        class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg font-semibold"
      >
        View Gallery
      </button>

    </form>

    <p id="loadingText" class="text-center text-sm text-gray-400 mt-3 hidden">
      Processing...
    </p>

  </div>

  <!-- ✅ ACCESS LOGIC -->
  <script defer src="./js/access.js"></script>

</body>
</html>

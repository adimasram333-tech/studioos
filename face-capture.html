<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face Capture</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.circle{
width:260px;
height:260px;
border-radius:50%;
overflow:hidden;
border:4px solid rgba(255,255,255,0.2);
position:relative;
}

.circle video{
width:100%;
height:100%;
object-fit:cover;
}

.status{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:4px 10px;
border-radius:20px;
font-size:12px;
}
</style>

</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div class="text-center">

<h2 class="text-xl mb-4">Capture Your Face</h2>

<div class="circle mx-auto">
<video id="video" autoplay muted playsinline></video>
<div id="status" class="status">Click Start</div>
</div>

<button id="startBtn"
class="mt-6 bg-indigo-600 px-6 py-2 rounded-lg">
Start Camera
</button>

</div>

<script>

let stream = null
let modelsLoaded = false
let detecting = false
let stableFrames = 0   // 🔥 NEW (IMPORTANT)

const video = document.getElementById("video")
const status = document.getElementById("status")

// ======================
// LOAD MODELS
// ======================

async function loadModels(){

if(modelsLoaded) return

try{

status.innerText = "Loading AI..."

const MODEL_URL = "/studioos/models"

console.log("Loading models from:", MODEL_URL)

await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
console.log("Tiny model loaded")

await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
console.log("Landmark model loaded")

await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
console.log("Recognition model loaded")

modelsLoaded = true
status.innerText = "Ready"

}catch(err){
console.error("MODEL ERROR:", err)
alert("Model load error: " + err.message)
}

}

// ======================
// START CAMERA
// ======================

async function startCamera(){

try{

if(!modelsLoaded){
alert("Models not loaded yet")
return
}

stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "user" }
})

video.srcObject = stream

// 🔥 FIX: wait for video ready
video.onloadedmetadata = () => {
video.play()
detecting = true
detectLoop()
}

status.innerText = "Detecting..."

}catch(err){
console.error(err)
alert("Camera permission denied")
}

}

// ======================
// DETECTION LOOP (FIXED PROPERLY)
// ======================

async function detectLoop(){

if(!detecting) return

const detection = await faceapi
.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
.withFaceLandmarks()
.withFaceDescriptor()

if(detection){

stableFrames++   // 🔥 NEW

status.innerText = "Hold Still..."

if(stableFrames >= 5){   // 🔥 FIX: stable capture
captureFace(detection)
return
}

}else{

stableFrames = 0   // 🔥 RESET
status.innerText = "No Face"

}

requestAnimationFrame(detectLoop)

}

// ======================
// CAPTURE FACE
// ======================

function captureFace(detection){

detecting = false

if(stream){
stream.getTracks().forEach(track=>track.stop())
}

status.innerText = "Captured ✅"

const descriptor = Array.from(detection.descriptor)

// save encoding
sessionStorage.setItem("face_encoding", JSON.stringify(descriptor))

const params = new URLSearchParams(window.location.search)
const eventId = params.get("event_id")

setTimeout(()=>{
window.location.href = `gallery.html?event_id=${eventId}`
}, 800)

}

// ======================
// BUTTON CLICK
// ======================

document.getElementById("startBtn").onclick = async ()=>{

await loadModels()
await startCamera()

}

</script>

</body>
</html>

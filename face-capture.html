<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face Capture</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- 🔥 REQUIRED DEPENDENCIES -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>
body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}
.circle{
width:260px;
height:260px;
border-radius:50%;
overflow:hidden;
border:4px solid rgba(255,255,255,0.2);
position:relative;
}
.circle video{
position:relative;
z-index:1;
width:100%;
height:100%;
object-fit:cover;
}
.status{
position:absolute;
z-index:5;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

/* 🔥 AI SCAN ANIMATION */
.scan-line {
position:absolute;
pointer-events:none;
z-index:4;
width:100%;
height:3px;
background:linear-gradient(90deg, transparent, #6366f1, transparent);
top:0;
left:0;
animation: scanMove 2s linear infinite;
opacity:0;
}

@keyframes scanMove {
0% { top:0; opacity:0; }
10% { opacity:1; }
90% { opacity:1; }
100% { top:100%; opacity:0; }
}

.circle.scanning .scan-line {
opacity:1;
}


/* ============================= */
/* PREMIUM AI FACE GUIDE OVERLAY */
/* ============================= */
.face-guide-overlay{
position:absolute;
inset:22px;
border-radius:50%;
pointer-events:none;
z-index:2;
}

.face-guide-ring{
position:absolute;
inset:0;
border-radius:50%;
border:2px solid rgba(99,102,241,0.45);
box-shadow:
0 0 18px rgba(99,102,241,0.35),
inset 0 0 22px rgba(99,102,241,0.14);
animation: guidePulse 2.4s ease-in-out infinite;
}

.face-guide-corner{
position:absolute;
width:42px;
height:42px;
border-color:#8b5cf6;
opacity:0.95;
filter:drop-shadow(0 0 8px rgba(139,92,246,0.65));
}

.face-guide-corner.tl{
top:8px;
left:18px;
border-top:3px solid;
border-left:3px solid;
border-top-left-radius:22px;
}

.face-guide-corner.tr{
top:8px;
right:18px;
border-top:3px solid;
border-right:3px solid;
border-top-right-radius:22px;
}

.face-guide-corner.bl{
bottom:8px;
left:18px;
border-bottom:3px solid;
border-left:3px solid;
border-bottom-left-radius:22px;
}

.face-guide-corner.br{
bottom:8px;
right:18px;
border-bottom:3px solid;
border-right:3px solid;
border-bottom-right-radius:22px;
}

.face-center-dot{
position:absolute;
top:50%;
left:50%;
width:8px;
height:8px;
border-radius:999px;
background:rgba(255,255,255,0.85);
transform:translate(-50%, -50%);
box-shadow:0 0 14px rgba(255,255,255,0.7);
opacity:0.65;
}

.face-guide-text{
position:absolute;
left:50%;
bottom:-46px;
transform:translateX(-50%);
font-size:11px;
white-space:nowrap;
color:#c7d2fe;
background:rgba(15,23,42,0.82);
border:1px solid rgba(255,255,255,0.12);
border-radius:999px;
padding:5px 10px;
backdrop-filter:blur(12px);
box-shadow:0 10px 22px rgba(0,0,0,0.25);
}

.circle.ready .face-guide-ring{
border-color:rgba(34,197,94,0.65);
box-shadow:
0 0 22px rgba(34,197,94,0.38),
inset 0 0 22px rgba(34,197,94,0.14);
}

.circle.ready .face-guide-corner{
border-color:#22c55e;
filter:drop-shadow(0 0 8px rgba(34,197,94,0.55));
}

.circle.scanning .face-guide-ring{
border-color:rgba(99,102,241,0.85);
animation: guidePulse 1.3s ease-in-out infinite;
}

.circle.success .face-guide-ring{
border-color:rgba(34,197,94,0.95);
box-shadow:
0 0 32px rgba(34,197,94,0.55),
inset 0 0 26px rgba(34,197,94,0.2);
}

.circle.failed .face-guide-ring{
border-color:rgba(245,158,11,0.9);
box-shadow:
0 0 26px rgba(245,158,11,0.45),
inset 0 0 20px rgba(245,158,11,0.16);
}

@keyframes guidePulse{
0%,100%{
transform:scale(1);
opacity:0.78;
}
50%{
transform:scale(1.035);
opacity:1;
}
}


.face-capture-ui-safe-card{
max-width:360px;
width:100%;
}

</style>

</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div class="text-center relative z-10 px-4 face-capture-ui-safe-card">

<h2 class="text-xl mb-2 font-semibold tracking-wide">AI Face Scan</h2>
<p class="text-xs text-gray-400 mb-5">Align your face inside the circle for best results</p>

<div class="circle mx-auto mb-12"><div class="scan-line" id="scanLine"></div>
<video id="video" autoplay muted playsinline></video>
<div class="face-guide-overlay" id="faceGuideOverlay">
  <div class="face-guide-ring"></div>
  <div class="face-guide-corner tl"></div>
  <div class="face-guide-corner tr"></div>
  <div class="face-guide-corner bl"></div>
  <div class="face-guide-corner br"></div>
  <div class="face-center-dot"></div>
  <div class="face-guide-text" id="faceGuideText">Align face in center</div>
</div>

<div id="status" class="status">Click Start</div>
</div>

<button id="startBtn"
style="position:relative; z-index:20;"
class="mt-6 bg-indigo-600 px-6 py-2 rounded-lg">
Start Camera
</button>

<button id="captureBtn"
style="position:relative; z-index:20;"
class="mt-3 bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg hidden">
Capture & Search
</button>

<button id="retryBtn"
style="position:relative; z-index:20;"
class="mt-3 bg-amber-500 hover:bg-amber-600 px-6 py-2 rounded-lg hidden">
Retry Scan
</button>

<p id="helpText" class="text-xs text-gray-400 mt-3 max-w-xs mx-auto hidden">
Try again with front face, eyes open, and better lighting. Avoid sunglasses if possible.
</p>

</div>

<script>

let stream = null
let processingFace = false
let cameraReady = false

const FACE_CAPTURE_MAX_SIZE = 1280
const FACE_CAPTURE_JPEG_QUALITY = 0.72
const FACE_SEARCH_TIMEOUT_MS = 25000
const FACE_SEARCH_RETRIES = 2

const video = document.getElementById("video")
const status = document.getElementById("status")
const startBtn = document.getElementById("startBtn")
const captureBtn = document.getElementById("captureBtn")
const retryBtn = document.getElementById("retryBtn")
const helpText = document.getElementById("helpText")

function getEventId(){
const params = new URLSearchParams(window.location.search)
const eventId = (params.get("event_id") || "").trim()
return eventId || null
}

function getRedirectUrl(eventId){
const params = new URLSearchParams(window.location.search)
const redirect = (params.get("redirect") || "").trim()

if(redirect){
try{
const parsed = new URL(redirect, window.location.origin)
if(parsed.origin === window.location.origin){
return parsed.href
}
}catch(_err){}
}

return `gallery.html?event_id=${encodeURIComponent(eventId)}`
}

function clearFaceSession(){

// Old browser face-api session cleanup
sessionStorage.removeItem("face_encoding")

// Current AWS Rekognition result session cleanup
sessionStorage.removeItem("matched_images")
sessionStorage.removeItem("matched_images_by_event")
sessionStorage.removeItem("face_verified")
sessionStorage.removeItem("face_scan_done")
sessionStorage.removeItem("face_scan_event_id")

}

function normalizeImageKey(value){
if(!value) return ""
return String(value).split("?")[0].replace(/^\/+/,"").trim()
}

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve, ms))
}



function setFaceGuideState(state, message){
const circle = document.querySelector(".circle")
const guideText = document.getElementById("faceGuideText")

if(!circle) return

circle.classList.remove("ready", "success", "failed")

if(state){
circle.classList.add(state)
}

if(guideText && message){
guideText.innerText = message
}
}

function setScanning(active){
const circle = document.querySelector(".circle")
if(!circle) return
if(active){
circle.classList.add("scanning")
}else{
circle.classList.remove("scanning")
}
}

function stopCamera(){
try{
if(stream){
stream.getTracks().forEach(track=>track.stop())
}
}catch(e){
console.error("Camera stop error:", e)
}
stream = null
cameraReady = false
}

function setBusyState(isBusy, text){
processingFace = isBusy

startBtn.disabled = isBusy
startBtn.style.opacity = isBusy ? "0.7" : "1"
startBtn.style.pointerEvents = isBusy ? "none" : "auto"

captureBtn.disabled = isBusy
captureBtn.style.opacity = isBusy ? "0.7" : "1"
captureBtn.style.pointerEvents = isBusy ? "none" : "auto"

retryBtn.disabled = isBusy
retryBtn.style.opacity = isBusy ? "0.7" : "1"
retryBtn.style.pointerEvents = isBusy ? "none" : "auto"

if(text){
status.innerText = text
}

if(text === "Camera Ready"){
setFaceGuideState("ready", "Face centered? Hold still")
}
if(text === "AI Analyzing..."){
setFaceGuideState(null, "Scanning face...")
}
if(text === "Match Found ✅"){
setFaceGuideState("success", "Match found")
}
if(text === "No Match Found ❌" || text === "Processing Failed"){
setFaceGuideState("failed", "Try front face + better light")
}
}
}

function showRetryUI(message){
setFaceGuideState("failed", "Try front face + better light")
setBusyState(false, message || "No Match Found ❌")
retryBtn.classList.remove("hidden")
helpText.classList.remove("hidden")
captureBtn.classList.add("hidden")
}

function hideRetryUI(){
retryBtn.classList.add("hidden")
helpText.classList.add("hidden")
}

function withTimeout(promise, ms, message){
return new Promise((resolve, reject)=>{
const timer = setTimeout(()=>{
reject(new Error(message || "Operation timed out"))
}, ms)

promise
.then(result=>{
clearTimeout(timer)
resolve(result)
})
.catch(err=>{
clearTimeout(timer)
reject(err)
})
})
}

function isRetryableFaceSearchError(err){
const message = String(err?.message || err || "").toLowerCase()
return (
message.includes("timeout") ||
message.includes("network") ||
message.includes("failed to fetch") ||
message.includes("temporarily") ||
message.includes("rate") ||
message.includes("throttl")
)
}

function saveMatchedImagesToSession(eventId, matchedImages){
const cleanImages = matchedImages
.map(normalizeImageKey)
.filter(Boolean)

sessionStorage.setItem("matched_images", JSON.stringify(cleanImages))

let map = {}
try{
map = JSON.parse(sessionStorage.getItem("matched_images_by_event") || "{}")
}catch(e){
map = {}
}

map[eventId] = cleanImages

sessionStorage.setItem("matched_images_by_event", JSON.stringify(map))
sessionStorage.setItem("face_verified", cleanImages.length > 0 ? "true" : "false")
sessionStorage.setItem("face_scan_done", "true")
sessionStorage.setItem("face_scan_event_id", eventId)
}

function getSearchFacesEndpoint(){
if(window.SEARCH_FACES_BY_SELFIE_URL){
return window.SEARCH_FACES_BY_SELFIE_URL
}

if(window.SAVE_S3_GALLERY_PHOTO_URL){
return String(window.SAVE_S3_GALLERY_PHOTO_URL).replace("/save-s3-gallery-photo", "/search-faces-by-selfie")
}

return "https://gnnaaagvlrmdveqxicob.supabase.co/functions/v1/search-faces-by-selfie"
}

async function getAccessToken(){
try{
if(typeof window.getCurrentSession === "function"){
const session = await window.getCurrentSession()
return session?.access_token || null
}

if(typeof window.getSupabase === "function"){
const supabase = await window.getSupabase()
const { data } = await supabase.auth.getSession()
return data?.session?.access_token || null
}
}catch(err){
console.warn("Session token unavailable for face search:", err)
}

return null
}

async function startCamera(){

try{

const eventId = getEventId()
if(!eventId){
alert("Invalid event access")
return
}

clearFaceSession()
hideRetryUI()
setFaceGuideState(null, "Align face in center")
setBusyState(true, "Opening Camera...")

if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
throw new Error("Camera is not supported on this device/browser")
}

stream = await navigator.mediaDevices.getUserMedia({
video: {
facingMode: "user",
width: { ideal: 640 },
height: { ideal: 480 }
},
audio: false
})

video.srcObject = stream

video.onloadedmetadata = async () => {
try{
await video.play()
cameraReady = true
setBusyState(false, "Camera Ready")
captureBtn.classList.remove("hidden")
startBtn.innerText = "Restart Camera"
}catch(err){
console.error("Video play error:", err)
stopCamera()
setBusyState(false, "Camera Error")
alert("Unable to start camera preview")
}
}

}catch(err){
console.error("Camera start error:", err)
stopCamera()
setBusyState(false, "Camera Error")
alert(err?.message || "Camera permission denied")
}
}

function captureVideoFrameBase64(){
if(!cameraReady || !video.videoWidth || !video.videoHeight){
throw new Error("Camera is not ready yet")
}

const sourceWidth = Number(video.videoWidth || 0)
const sourceHeight = Number(video.videoHeight || 0)

if(!sourceWidth || !sourceHeight){
throw new Error("Invalid camera frame")
}

const scale = Math.min(1, FACE_CAPTURE_MAX_SIZE / sourceWidth, FACE_CAPTURE_MAX_SIZE / sourceHeight)
const targetWidth = Math.max(1, Math.round(sourceWidth * scale))
const targetHeight = Math.max(1, Math.round(sourceHeight * scale))

const canvas = document.createElement("canvas")
canvas.width = targetWidth
canvas.height = targetHeight

const ctx = canvas.getContext("2d", { alpha:false })
if(!ctx){
throw new Error("Unable to capture image")
}

ctx.fillStyle = "#ffffff"
ctx.fillRect(0, 0, targetWidth, targetHeight)
ctx.drawImage(video, 0, 0, targetWidth, targetHeight)

const dataUrl = canvas.toDataURL("image/jpeg", FACE_CAPTURE_JPEG_QUALITY)
const parts = dataUrl.split(",")

if(parts.length < 2 || !parts[1]){
throw new Error("Invalid captured image")
}

if(parts[1].length < 1000){
throw new Error("Captured image is too small")
}

return parts[1]
}

async function searchFaceWithAWS(eventId, imageBase64){
const endpoint = getSearchFacesEndpoint()
const accessToken = await getAccessToken()

const headers = {
"Content-Type": "application/json",
"apikey": window.SUPABASE_ANON_KEY || ""
}

if(accessToken){
headers.Authorization = `Bearer ${accessToken}`
}

let lastError = null

for(let attempt = 0; attempt <= FACE_SEARCH_RETRIES; attempt++){

try{

const response = await withTimeout(
fetch(endpoint, {
method: "POST",
headers,
body: JSON.stringify({
event_id: eventId,
image_base64: imageBase64
})
}),
FACE_SEARCH_TIMEOUT_MS,
"Face search timeout"
)

let result = null
try{
result = await response.json()
}catch(_err){
result = null
}

if(!response.ok || !result?.success){
throw new Error(result?.error || "Face search failed")
}

return result

}catch(err){

lastError = err

if(attempt >= FACE_SEARCH_RETRIES || !isRetryableFaceSearchError(err)){
throw err
}

status.innerText = `Retrying scan ${attempt + 1}/${FACE_SEARCH_RETRIES}...`
await sleep(700 * Math.pow(2, attempt))

}

}

throw lastError || new Error("Face search failed")
}

async function captureAndSearch(){

if(processingFace) return

const eventId = getEventId()

if(!eventId){
setBusyState(false, "Invalid Event")
alert("Invalid event access")
window.location.href = "access.html"
return
}

try{

setBusyState(true, "AI Analyzing..."); setScanning(true)

const imageBase64 = captureVideoFrameBase64()

const result = await searchFaceWithAWS(eventId, imageBase64)

const matches = Array.isArray(result?.matches) ? result.matches : []

const matchedImages = matches
.map(item => item?.object_key || item?.preview_key || item?.image_url || "")
.map(normalizeImageKey)
.filter(Boolean)

saveMatchedImagesToSession(eventId, matchedImages)

if(matchedImages.length === 0){
clearFaceSession()
setScanning(false); showRetryUI("No Match Found ❌")
return
}

hideRetryUI()
stopCamera()
setScanning(false); setBusyState(false, "Match Found ✅")

setTimeout(()=>{
window.location.href = getRedirectUrl(eventId)
}, 500)

}catch(err){
console.error("Face search error:", err)
clearFaceSession()
setScanning(false); showRetryUI("Processing Failed")
alert("Face processing failed: " + (err?.message || "Unknown error"))
}
}

startBtn.onclick = async ()=>{
if(processingFace) return
stopCamera()
await startCamera()
}

captureBtn.onclick = async ()=>{
if(processingFace) return
await captureAndSearch()
}

retryBtn.onclick = async ()=>{
if(processingFace) return
stopCamera()
await startCamera()
}

window.addEventListener("beforeunload", ()=>{
stopCamera()
})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face Capture</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="js/supabase.js"></script>

<style>
body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}
.circle{
width:260px;
height:260px;
border-radius:50%;
overflow:hidden;
border:4px solid rgba(255,255,255,0.2);
position:relative;
}
.circle video{
width:100%;
height:100%;
object-fit:cover;
}
.status{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:4px 10px;
border-radius:20px;
font-size:12px;
}
</style>

</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div class="text-center">

<h2 class="text-xl mb-4">Capture Your Face</h2>

<div class="circle mx-auto">
<video id="video" autoplay muted playsinline></video>
<div id="status" class="status">Click Start</div>
</div>

<button id="startBtn"
class="mt-6 bg-indigo-600 px-6 py-2 rounded-lg">
Start Camera
</button>

</div>

<script>

let stream = null
let modelsLoaded = false
let detecting = false
let stableFrames = 0

const video = document.getElementById("video")
const status = document.getElementById("status")

async function loadModels(){

if(modelsLoaded) return

const MODEL_URL = "/studioos/models"

await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)

modelsLoaded = true
status.innerText = "Ready"
}

async function startCamera(){

stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "user" }
})

video.srcObject = stream

video.onloadedmetadata = () => {
video.play()
detecting = true
detectLoop()
}

status.innerText = "Detecting..."
}

async function detectLoop(){

if(!detecting) return

const detection = await faceapi
.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
.withFaceLandmarks()
.withFaceDescriptor()

if(detection){

stableFrames++
status.innerText = "Hold Still..."

if(stableFrames >= 5){
captureFace(detection)
return
}

}else{
stableFrames = 0
status.innerText = "No Face"
}

requestAnimationFrame(detectLoop)
}

async function captureFace(detection){

detecting = false

if(stream){
stream.getTracks().forEach(track=>track.stop())
}

status.innerText = "Processing..."

const descriptor = Array.from(detection.descriptor)

sessionStorage.setItem("face_encoding", JSON.stringify(descriptor))

const params = new URLSearchParams(window.location.search)
const eventId = params.get("event_id")

try{

const supabase = await window.getSupabase()

const { data: faces } = await supabase
.from("face_data")
.select("face_encoding, image_url")
.eq("event_id", eventId)

let matched = []

if(faces && faces.length){

faces.forEach(row=>{

let dist = 0

for(let i=0;i<row.face_encoding.length;i++){
const diff = row.face_encoding[i] - descriptor[i]
dist += diff * diff
}

dist = Math.sqrt(dist)

if(dist < 0.60){
matched.push(row.image_url)
}

})

}

sessionStorage.setItem("matched_images", JSON.stringify(matched))
sessionStorage.setItem("face_verified", "true")
sessionStorage.setItem("face_scan_event_id", eventId)

if(matched.length === 0){

status.innerText = "No Match Found ❌"

setTimeout(()=>{
alert("No photos found for your face")
window.location.href = `access.html?event_id=${eventId}`
}, 1000)

return
}

status.innerText = "Match Found ✅"

setTimeout(()=>{
window.location.href = `gallery.html?event_id=${eventId}`
}, 800)

}catch(err){

console.error(err)
alert("Face processing failed")

window.location.href = `access.html?event_id=${eventId}`

}

}

document.getElementById("startBtn").onclick = async ()=>{
await loadModels()
await startCamera()
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face Capture</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<!-- 🔥 REQUIRED DEPENDENCIES -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/face.js"></script>

<style>
body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}
.circle{
width:260px;
height:260px;
border-radius:50%;
overflow:hidden;
border:4px solid rgba(255,255,255,0.2);
position:relative;
}
.circle video{
width:100%;
height:100%;
object-fit:cover;
}
.status{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:4px 10px;
border-radius:20px;
font-size:12px;
}
</style>

</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div class="text-center">

<h2 class="text-xl mb-4">Capture Your Face</h2>

<div class="circle mx-auto">
<video id="video" autoplay muted playsinline></video>
<div id="status" class="status">Click Start</div>
</div>

<button id="startBtn"
class="mt-6 bg-indigo-600 px-6 py-2 rounded-lg">
Start Camera
</button>

</div>

<script>

let stream = null
let modelsLoaded = false
let detecting = false
let stableFrames = 0
let processingFace = false

const video = document.getElementById("video")
const status = document.getElementById("status")
const startBtn = document.getElementById("startBtn")

function getEventId(){
const params = new URLSearchParams(window.location.search)
const eventId = (params.get("event_id") || "").trim()
return eventId || null
}

function clearFaceSession(){
sessionStorage.removeItem("face_encoding")
sessionStorage.removeItem("matched_images")
sessionStorage.removeItem("matched_images_by_event")
sessionStorage.removeItem("face_verified")
sessionStorage.removeItem("face_scan_done")
sessionStorage.removeItem("face_scan_event_id")
}

function normalizeImageUrl(url){
if(!url) return ""
return String(url).split("?")[0].trim()
}

function stopCamera(){
try{
if(stream){
stream.getTracks().forEach(track=>track.stop())
}
}catch(e){
console.error("Camera stop error:", e)
}
stream = null
}

function setBusyState(isBusy, text){
processingFace = isBusy
startBtn.disabled = isBusy
startBtn.style.opacity = isBusy ? "0.7" : "1"
startBtn.style.pointerEvents = isBusy ? "none" : "auto"
if(text){
status.innerText = text
}
}

function withTimeout(promise, ms, message){
return new Promise((resolve, reject)=>{
const timer = setTimeout(()=>{
reject(new Error(message || "Operation timed out"))
}, ms)

promise
.then(result=>{
clearTimeout(timer)
resolve(result)
})
.catch(err=>{
clearTimeout(timer)
reject(err)
})
})
}

function saveMatchedImagesToSession(eventId, matchedImages){
const cleanImages = matchedImages
.map(normalizeImageUrl)
.filter(Boolean)

sessionStorage.setItem("matched_images", JSON.stringify(cleanImages))

let map = {}
try{
map = JSON.parse(sessionStorage.getItem("matched_images_by_event") || "{}")
}catch(e){
map = {}
}

map[eventId] = cleanImages

sessionStorage.setItem("matched_images_by_event", JSON.stringify(map))
sessionStorage.setItem("face_verified", cleanImages.length > 0 ? "true" : "false")
sessionStorage.setItem("face_scan_done", "true")
sessionStorage.setItem("face_scan_event_id", eventId)
}

function getFaceDistance(a, b){
if(!Array.isArray(a) || !Array.isArray(b)) return Number.POSITIVE_INFINITY
if(a.length !== b.length) return Number.POSITIVE_INFINITY

let dist = 0

for(let i=0;i<a.length;i++){
const diff = Number(a[i]) - Number(b[i])
dist += diff * diff
}

return Math.sqrt(dist)
}

async function loadModels(){

if(modelsLoaded) return

try{
setBusyState(true, "Loading AI...")

if(!window.faceEngine || typeof window.faceEngine.loadFaceModels !== "function"){
throw new Error("Face engine not loaded")
}

await withTimeout(
window.faceEngine.loadFaceModels(),
15000,
"AI models load timeout"
)

modelsLoaded = true
setBusyState(false, "Ready")
}catch(err){
console.error("MODEL ERROR:", err)
setBusyState(false, "Model Error")
alert("Model load error: " + err.message)
}
}

async function startCamera(){

try{

const eventId = getEventId()
if(!eventId){
alert("Invalid event access")
return
}

clearFaceSession()

if(!modelsLoaded){
alert("Models not loaded yet")
return
}

setBusyState(true, "Opening Camera...")

stream = await navigator.mediaDevices.getUserMedia({
video: {
facingMode: "user",
width: { ideal: 640 },
height: { ideal: 480 }
},
audio: false
})

video.srcObject = stream

video.onloadedmetadata = async () => {
try{
await video.play()
stableFrames = 0
detecting = true
setBusyState(false, "Detecting...")
requestAnimationFrame(detectLoop)
}catch(err){
console.error("Video play error:", err)
stopCamera()
setBusyState(false, "Camera Error")
alert("Unable to start camera preview")
}
}

}catch(err){
console.error("Camera start error:", err)
stopCamera()
setBusyState(false, "Camera Error")
alert("Camera permission denied")
}
}

async function detectLoop(){

if(!detecting || processingFace) return

try{

if(!window.faceEngine || typeof window.faceEngine.detectSingleFace !== "function"){
throw new Error("Face engine detect function missing")
}

const encoding = await window.faceEngine.detectSingleFace(video)

if(encoding){

stableFrames++
status.innerText = "Hold Still..."

if(stableFrames >= 5){
await captureFace(encoding)
return
}

}else{
stableFrames = 0
status.innerText = "No Face"
}

}catch(err){
console.error("Detection loop error:", err)
stableFrames = 0
status.innerText = "Detection Error"
}

if(detecting && !processingFace){
requestAnimationFrame(detectLoop)
}
}

async function captureFace(descriptor){

if(processingFace) return

detecting = false
setBusyState(true, "Processing...")

stopCamera()

sessionStorage.setItem("face_encoding", JSON.stringify(descriptor))

const eventId = getEventId()

if(!eventId){
setBusyState(false, "Invalid Event")
alert("Invalid event access")
window.location.href = "access.html"
return
}

try{

const supabase = await withTimeout(
window.getSupabase(),
10000,
"Supabase initialization timeout"
)

const { data: faces, error } = await withTimeout(
supabase
.from("face_data")
.select("face_encoding, image_url")
.eq("event_id", eventId),
15000,
"Face data fetch timeout"
)

if(error){
throw error
}

const strongMatches = []

if(Array.isArray(faces)){

for(const row of faces){

if(!row || !Array.isArray(row.face_encoding) || !row.image_url){
continue
}

const dist = getFaceDistance(row.face_encoding, descriptor)

// 🔥 STRICT THRESHOLD
if(dist < 0.45){
strongMatches.push({
image_url: row.image_url,
distance: dist
})
}
}

}

strongMatches.sort((a, b) => a.distance - b.distance)

const matched = []
const seenUrls = new Set()

strongMatches.forEach(item=>{
const cleanUrl = normalizeImageUrl(item.image_url)
if(cleanUrl && !seenUrls.has(cleanUrl)){
seenUrls.add(cleanUrl)
matched.push(cleanUrl)
}
})

saveMatchedImagesToSession(eventId, matched)

if(matched.length === 0){
setBusyState(false, "No Match Found ❌")
setTimeout(()=>{
alert("No photos found for your face")
window.location.href = `access.html?event_id=${eventId}`
}, 600)
return
}

setBusyState(false, "Match Found ✅")

setTimeout(()=>{
window.location.href = `gallery.html?event_id=${eventId}`
}, 500)

}catch(err){
console.error("Face processing error:", err)
setBusyState(false, "Processing Failed")
alert("Face processing failed: " + err.message)
window.location.href = `access.html?event_id=${eventId}`
}
}

startBtn.onclick = async ()=>{
if(processingFace) return
await loadModels()
if(modelsLoaded){
await startCamera()
}
}

window.addEventListener("beforeunload", ()=>{
stopCamera()
})

</script>

</body>
</html>

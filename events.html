<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Events - StudioOS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.day-label {
  color: #94a3b8;
  font-size: 11px;
}

@media (min-width: 640px) {
  .day-label {
    font-size: 12px;
  }
}
</style>

</head>

<body class="bg-slate-900 text-white min-h-screen p-3 sm:p-6">

<div class="w-full max-w-md mx-auto">

<h1 class="text-2xl font-bold mb-5 sm:mb-6 text-center">
Smart Calendar
</h1>

<!-- Month Navigation -->
<div class="flex justify-between items-center mb-4 gap-3">
<button id="prevMonth" class="px-3 py-2 bg-slate-700 rounded hover:bg-slate-600 transition shrink-0">←</button>
<h2 id="monthLabel" class="font-semibold text-sm sm:text-base text-center flex-1"></h2>
<button id="nextMonth" class="px-3 py-2 bg-slate-700 rounded hover:bg-slate-600 transition shrink-0">→</button>
</div>

<!-- WEEK LABELS -->
<div class="grid grid-cols-7 gap-1.5 sm:gap-2 text-center mb-2">
<div class="day-label">Sun</div>
<div class="day-label">Mon</div>
<div class="day-label">Tue</div>
<div class="day-label">Wed</div>
<div class="day-label">Thu</div>
<div class="day-label">Fri</div>
<div class="day-label">Sat</div>
</div>

<!-- Calendar Grid -->
<div id="calendar" class="grid grid-cols-7 gap-1.5 sm:gap-2 text-center mb-5 sm:mb-6 w-full"></div>

<!-- Event List -->
<div id="eventList" class="space-y-3 sm:space-y-4"></div>

</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-3">

<div class="bg-slate-800 p-4 rounded w-full max-w-sm">

<h3 id="selectedDate" class="mb-3 font-semibold"></h3>

<textarea id="noteInput" class="w-full p-2 rounded bg-slate-700 mb-3 min-h-[110px] outline-none" placeholder="Write note..."></textarea>

<p class="text-xs text-gray-400 mb-2">
You can later convert this date into an event
</p>

<button id="saveNote" class="w-full bg-blue-600 py-2 rounded mb-2 hover:bg-blue-500 transition">
Save Note
</button>

<button onclick="closeModal()" class="w-full bg-slate-600 py-2 rounded hover:bg-slate-500 transition">
Close
</button>

</div>

</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Supabase INIT -->
<script src="js/supabase.js"></script>

<!-- LOADER -->
<script>

function loadEventsScript(){
const script = document.createElement("script")
script.src = "js/events.js"
script.defer = true
document.body.appendChild(script)
}

function waitForSupabaseAndLoad(){

if(typeof window.getSupabase === "function"){
loadEventsScript()
} else {
setTimeout(waitForSupabaseAndLoad, 50)
}

}

document.addEventListener("DOMContentLoaded", function(){
waitForSupabaseAndLoad()
})

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<title>Events - StudioOS</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white p-6">

<div class="max-w-md mx-auto">

<h1 class="text-2xl font-bold mb-6">
Smart Calendar
</h1>

<!-- Month Navigation -->
<div class="flex justify-between items-center mb-4">
<button id="prevMonth" class="px-3 py-1 bg-slate-700 rounded">←</button>
<h2 id="monthLabel" class="font-semibold"></h2>
<button id="nextMonth" class="px-3 py-1 bg-slate-700 rounded">→</button>
</div>

<!-- Calendar Grid -->
<div id="calendar" class="grid grid-cols-7 gap-2 text-center mb-6"></div>

<!-- ✅ ADD THIS (MISSING ELEMENT — FIX) -->
<div id="eventList" class="space-y-4"></div>

</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center">

<div class="bg-slate-800 p-4 rounded w-full max-w-sm">

<h3 id="selectedDate" class="mb-3 font-semibold"></h3>

<textarea id="noteInput" class="w-full p-2 rounded bg-slate-700 mb-3" placeholder="Write note..."></textarea>

<button id="saveNote" class="w-full bg-blue-600 py-2 rounded mb-2">
Save Note
</button>

<button onclick="closeModal()" class="w-full bg-slate-600 py-2 rounded">
Close
</button>

</div>

</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Supabase INIT -->
<script src="js/supabase.js"></script>

<!-- LOADER -->
<script>

function loadEventsScript(){
const script = document.createElement("script")
script.src = "js/events.js"
script.defer = true
document.body.appendChild(script)
}

function waitForSupabaseAndLoad(){

if(typeof window.getSupabase === "function"){
loadEventsScript()
} else {
setTimeout(waitForSupabaseAndLoad, 50)
}

}

document.addEventListener("DOMContentLoaded", function(){
waitForSupabaseAndLoad()
})

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<title>Events - StudioOS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.day-label {
  color: #94a3b8;
  font-size: 12px;
}
</style>

</head>

<body class="bg-slate-900 text-white p-4 sm:p-6">

<div class="w-full max-w-md sm:max-w-md mx-auto">

<h1 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6 text-center">
Smart Calendar
</h1>

<!-- Month Navigation -->
<div class="flex justify-between items-center mb-4">
<button id="prevMonth" class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 transition">←</button>
<h2 id="monthLabel" class="font-semibold text-sm sm:text-base"></h2>
<button id="nextMonth" class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 transition">→</button>
</div>

<!-- WEEK LABELS -->
<div class="grid grid-cols-7 gap-1 sm:gap-2 text-center mb-2">
<div class="day-label">Sun</div>
<div class="day-label">Mon</div>
<div class="day-label">Tue</div>
<div class="day-label">Wed</div>
<div class="day-label">Thu</div>
<div class="day-label">Fri</div>
<div class="day-label">Sat</div>
</div>

<!-- Calendar Grid -->
<div id="calendar" class="grid grid-cols-7 gap-1 sm:gap-2 text-center mb-6"></div>

<!-- Event List -->
<div id="eventList" class="space-y-3 sm:space-y-4 text-sm sm:text-base"></div>

</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center">

<div class="bg-slate-800 p-4 rounded w-full max-w-sm mx-2">

<h3 id="selectedDate" class="mb-3 font-semibold text-sm sm:text-base"></h3>

<textarea id="noteInput" class="w-full p-2 rounded bg-slate-700 mb-3 text-sm" placeholder="Write note..."></textarea>

<p class="text-xs text-gray-400 mb-2">
You can later convert this date into an event
</p>

<button id="saveNote" class="w-full bg-blue-600 py-2 rounded mb-2 hover:bg-blue-500 transition text-sm">
Save Note
</button>

<button onclick="closeModal()" class="w-full bg-slate-600 py-2 rounded hover:bg-slate-500 transition text-sm">
Close
</button>

</div>

</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Supabase INIT -->
<script src="js/supabase.js"></script>

<!-- LOADER -->
<script>

function loadEventsScript(){
const script = document.createElement("script")
script.src = "js/events.js"
script.defer = true
document.body.appendChild(script)
}

function waitForSupabaseAndLoad(){

if(typeof window.getSupabase === "function"){
loadEventsScript()
} else {
setTimeout(waitForSupabaseAndLoad, 50)
}

}

document.addEventListener("DOMContentLoaded", function(){
waitForSupabaseAndLoad()
})

</script>

</body>
</html>

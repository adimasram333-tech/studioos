<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Loading Proposal...</title>

<script>

// =============================
// GET ID FROM QUERY (?id=)
// =============================

const params = new URLSearchParams(window.location.search)

let quotationId = params.get("id")


// =============================
// SUPPORT SEO LINK
// /p/client-name-UUID
// =============================

if(!quotationId){

const path = window.location.pathname
const parts = path.split("/")

const slug = parts[parts.length - 1]

if(slug && slug.includes("-")){

quotationId =
slug.substring(slug.lastIndexOf("-") + 1)

}

}


// =============================
// REDIRECT TO PROPOSAL
// =============================

if(quotationId){

window.location.href =
"/studioos/proposal.html?id=" + quotationId

}else{

document.body.innerHTML = "Invalid proposal link"

}

</script>

</head>

<body>

Loading proposal...

</body>

</html>

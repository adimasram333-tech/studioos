<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Loading Proposal...</title>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

</head>

<body>

<div id="status">Loading proposal...</div>

<script>

// =====================
// GET PARAMS
// =====================

const params = new URLSearchParams(window.location.search)

let shortId = null


// CASE 1
// ?id=xxxxx

if(params.get("id")){
shortId = params.get("id")
}


// CASE 2
// ?slug=client-name-xxxxx

if(!shortId && params.get("slug")){

const slug = params.get("slug")

if(slug.includes("-")){
shortId = slug.substring(slug.lastIndexOf("-") + 1)
}

}


// CASE 3
// /p/client-name-xxxxx

if(!shortId){

const path = window.location.pathname
const parts = path.split("/")

const slug = parts[parts.length - 1]

if(slug && slug.includes("-")){
shortId = slug.substring(slug.lastIndexOf("-") + 1)
}

}


// =====================
// LOAD PROPOSAL
// =====================

async function loadProposal(){

const status = document.getElementById("status")

if(!shortId){

status.innerHTML = "Invalid proposal link"
return

}

try{

const { data, error } = await supabase
.from("quotations")
.select("id")
.eq("short_id", shortId)
.single()

if(error || !data){

status.innerHTML = "Proposal not found"
return

}

const fullId = data.id


// =====================
// REDIRECT FIX
// =====================

window.location.replace(
"/studioos/proposal.html?id=" + fullId
)


}catch(err){

status.innerHTML = "Error loading proposal"

}

}

loadProposal()

</script>

</body>

</html>

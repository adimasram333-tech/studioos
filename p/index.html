<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Loading Proposal...</title>

<script>

const path = window.location.pathname

const parts = path.split("/")

const slug = parts[parts.length - 1]

// extract UUID
const id = slug.substring(slug.lastIndexOf("-") + 1)

if(id){

window.location.href =
"/studioos/proposal.html?id=" + id

}

</script>

</head>

<body>

Loading proposal...

</body>

</html>

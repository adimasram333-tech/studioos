<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Loading Proposal...</title>

<!-- SUPABASE LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- SUPABASE CONNECTION -->
<script src="../js/supabase.js"></script>

</head>

<body>

<div id="status">Loading proposal...</div>

<script>

// =============================
// GET SHORT ID
// =============================

let shortId = null

// =============================
// GET ID FROM QUERY (?id=)
// =============================

const params = new URLSearchParams(window.location.search)

if(params.get("id")){
shortId = params.get("id")
}


// =============================
// SUPPORT SEO LINK
// /p/client-name-96c23df2
// =============================

if(!shortId){

const path = window.location.pathname
const parts = path.split("/")

const slug = parts[parts.length - 1]

if(slug && slug.includes("-")){

shortId =
slug.substring(slug.lastIndexOf("-") + 1)

}

}


// =============================
// LOAD FULL UUID FROM DATABASE
// =============================

async function loadProposal(){

const status = document.getElementById("status")

if(!shortId){

status.innerHTML = "Invalid proposal link"
return

}

try{

const { data, error } = await supabase
.from("quotations")
.select("id")
.eq("short_id", shortId)
.single()

if(error || !data){

status.innerHTML = "Proposal not found"
return

}

const fullId = data.id


// =============================
// REDIRECT TO PROPOSAL
// =============================

window.location.replace(
"../proposal.html?id=" + fullId
)

}catch(err){

status.innerHTML = "Error loading proposal"

}

}


// =============================
// INIT
// =============================

loadProposal()

</script>

</body>

</html>

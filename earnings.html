<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earnings - StudioOS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ✅ REQUIRED FIX -->
<script src="js/supabase.js"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
color:white;
font-family:system-ui;
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

</style>

</head>


<body class="min-h-screen p-4">

<div class="max-w-md mx-auto">

<h1 class="text-xl font-semibold mb-6">💰 Earnings Dashboard</h1>


<!-- SUMMARY -->
<div class="grid grid-cols-2 gap-4 mb-6">

<div class="glass rounded-2xl p-4">
<p class="text-gray-400 text-sm">Total Earnings</p>
<h2 id="totalEarnings" class="text-2xl font-bold">₹0</h2>
</div>

<div class="glass rounded-2xl p-4">
<p class="text-gray-400 text-sm">This Month</p>
<h2 id="monthlyEarnings" class="text-2xl font-bold">₹0</h2>
</div>

<div class="glass rounded-2xl p-4 col-span-2">
<p class="text-gray-400 text-sm">Total Sales</p>
<h2 id="totalSales" class="text-2xl font-bold">0</h2>
</div>

</div>


<!-- TRANSACTIONS -->
<div class="glass rounded-2xl p-4">

<h2 class="text-lg mb-3">📄 Transactions</h2>

<div id="transactionsList" class="space-y-3 text-sm text-gray-300">

<p class="text-gray-400">No earnings yet</p>

</div>

</div>

</div>

<script type="module" src="js/earnings.js"></script>

</body>
</html>

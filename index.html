<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudioOS Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

.link{
color:#818cf8;
cursor:pointer;
}

</style>

</head>

<body class="text-white min-h-screen flex items-center justify-center">

<!-- LOGIN CONTAINER -->

<div id="loginBox" class="glass p-8 rounded-2xl w-80 hidden">

<h2 id="title" class="text-xl font-bold mb-6 text-center">
StudioOS Login
</h2>

<form id="authForm">

<input
id="email"
type="email"
placeholder="Email"
class="w-full mb-4 p-3 rounded-lg bg-black/40"
required>

<input
id="password"
type="password"
placeholder="Password"
class="w-full mb-6 p-3 rounded-lg bg-black/40"
required>

<button
id="submitBtn"
type="submit"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg">
Login
</button>

</form>

<button
id="googleBtn"
type="button"
class="w-full mt-4 bg-white text-black p-3 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-100">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18" aria-hidden="true">
<path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
<path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/>
<path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.8-3.3-11.5-8l-6.5 5C9.3 39.5 16.1 44 24 44z"/>
<path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.6-6 7.1l.1-.1 6.2 5.2C35.2 40.6 44 34 44 24c0-1.3-.1-2.4-.4-3.5z"/>
</svg>
Continue with Google
</button>

<p class="text-center text-sm mt-4">

<span id="toggleText">
Don't have an account?
</span>

<span id="toggleBtn" class="link">
Signup
</span>

</p>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script type="module">

import { login, signup, googleLogin } from "./js/auth.js"


// ======================
// WAIT FOR SUPABASE CLIENT
// ======================

function waitForSupabase(){

return new Promise(resolve=>{

const check = setInterval(()=>{

if(window.supabaseClient){

clearInterval(check)
resolve(window.supabaseClient)

}

},50)

})

}


// ======================
// SESSION CHECK
// ======================

const supabase = await waitForSupabase()

const { data:{ session } } =
await supabase.auth.getSession()

if(session){

window.location.replace("dashboard.html")

}else{

document.getElementById("loginBox").classList.remove("hidden")

}


// ======================
// LOGIN / SIGNUP LOGIC
// ======================

let mode = "login"

const form =
document.getElementById("authForm")

const title =
document.getElementById("title")

const btn =
document.getElementById("submitBtn")

const toggle =
document.getElementById("toggleBtn")

const text =
document.getElementById("toggleText")

const googleBtn =
document.getElementById("googleBtn")


// TOGGLE LOGIN / SIGNUP

toggle.addEventListener("click",()=>{

if(mode==="login"){

mode="signup"

title.innerText="Create Account"
btn.innerText="Signup"

text.innerText="Already have an account?"
toggle.innerText="Login"

}else{

mode="login"

title.innerText="StudioOS Login"
btn.innerText="Login"

text.innerText="Don't have an account?"
toggle.innerText="Signup"

}

})


// FORM SUBMIT

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const email =
document.getElementById("email").value

const password =
document.getElementById("password").value

if(mode==="login"){

await login(email,password)

}else{

await signup(email,password)

}

})


// GOOGLE LOGIN

googleBtn.addEventListener("click", async ()=>{

await googleLogin()

})

</script>

</body>
</html>

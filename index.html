<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudioOS Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

.link{
color:#818cf8;
cursor:pointer;
}

.link:hover{
text-decoration:underline;
}

.helper-row{
display:flex;
align-items:center;
justify-content:flex-end;
margin-top:-0.5rem;
margin-bottom:1rem;
}

.feedback{
display:none;
margin-top:1rem;
padding:0.85rem 1rem;
border-radius:0.85rem;
font-size:0.9rem;
line-height:1.5;
border:1px solid rgba(255,255,255,0.08);
}

.feedback.show{
display:block;
}

.feedback.info{
background:rgba(99,102,241,0.12);
border-color:rgba(99,102,241,0.3);
color:#c7d2fe;
}

.feedback.success{
background:rgba(34,197,94,0.12);
border-color:rgba(34,197,94,0.28);
color:#bbf7d0;
}

.feedback.error{
background:rgba(239,68,68,0.12);
border-color:rgba(239,68,68,0.28);
color:#fecaca;
}

</style>

</head>

<body class="text-white min-h-screen flex items-center justify-center px-4">

<div id="loginBox" class="glass p-8 rounded-2xl w-80 hidden">

<h2 id="title" class="text-xl font-bold mb-6 text-center">
StudioOS Login
</h2>

<form id="authForm">

<input
id="email"
type="email"
placeholder="Email"
class="w-full mb-4 p-3 rounded-lg bg-black/40"
required>

<input
id="password"
type="password"
placeholder="Password"
class="w-full mb-3 p-3 rounded-lg bg-black/40"
required>

<div id="forgotPasswordRow" class="helper-row">
<span id="forgotPasswordBtn" class="link text-sm">Forgot Password?</span>
</div>

<button
id="submitBtn"
type="submit"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg">
Login
</button>

</form>

<div id="authFeedback" class="feedback info"></div>

<button
id="googleBtn"
type="button"
class="w-full mt-4 bg-white text-black p-3 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-100">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18" aria-hidden="true">
<path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
<path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/>
<path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.8-3.3-11.5-8l-6.5 5C9.3 39.5 16.1 44 24 44z"/>
<path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.6-6 7.1l.1-.1 6.2 5.2C35.2 40.6 44 34 44 24c0-1.3-.1-2.4-.4-3.5z"/>
</svg>
Continue with Google
</button>

<p class="text-center text-sm mt-4">
<span id="toggleText">
Don't have an account?
</span>
<span id="toggleBtn" class="link">
Signup
</span>
</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script type="module">

import { login, signup, googleLogin } from "./js/auth.js"

function waitForSupabase(){
return new Promise(resolve=>{
const check = setInterval(()=>{
if(window.supabaseClient){
clearInterval(check)
resolve(window.supabaseClient)
}
},50)
})
}

function setFeedback(type, message){
const box = document.getElementById("authFeedback")
box.className = "feedback show"

if(type === "success"){
box.classList.add("success")
}else if(type === "error"){
box.classList.add("error")
}else{
box.classList.add("info")
}

box.innerText = message
}

function clearFeedback(){
const box = document.getElementById("authFeedback")
box.className = "feedback info"
box.innerText = ""
}

function getResetRedirectUrl(){
const current = window.location.href
const base = current.substring(0, current.lastIndexOf("/") + 1)
return `${base}reset-password.html`
}

const supabase = await waitForSupabase()

const { data:{ session } } =
await supabase.auth.getSession()

if(session){
window.location.replace("dashboard.html")
}else{
document.getElementById("loginBox").classList.remove("hidden")
}

let mode = "login"

const form = document.getElementById("authForm")
const title = document.getElementById("title")
const btn = document.getElementById("submitBtn")
const toggle = document.getElementById("toggleBtn")
const text = document.getElementById("toggleText")
const googleBtn = document.getElementById("googleBtn")
const passwordInput = document.getElementById("password")
const forgotPasswordRow = document.getElementById("forgotPasswordRow")
const forgotPasswordBtn = document.getElementById("forgotPasswordBtn")

function syncModeUi(){
clearFeedback()

if(mode==="login"){
title.innerText="StudioOS Login"
btn.innerText="Login"
text.innerText="Don't have an account?"
toggle.innerText="Signup"
passwordInput.required = true
passwordInput.disabled = false
passwordInput.placeholder = "Password"
forgotPasswordRow.style.display = "flex"
}else{
title.innerText="Create Account"
btn.innerText="Signup"
text.innerText="Already have an account?"
toggle.innerText="Login"
passwordInput.required = true
passwordInput.disabled = false
passwordInput.placeholder = "Password"
forgotPasswordRow.style.display = "none"
}
}

syncModeUi()

toggle.addEventListener("click",()=>{
mode = mode === "login" ? "signup" : "login"
syncModeUi()
})

forgotPasswordBtn.addEventListener("click", async ()=>{
clearFeedback()

const email = document.getElementById("email").value.trim()

if(!email){
setFeedback("error", "Please enter your email first to receive a password reset link.")
document.getElementById("email").focus()
return
}

try{
forgotPasswordBtn.style.pointerEvents = "none"
forgotPasswordBtn.style.opacity = "0.7"

const { error } = await supabase.auth.resetPasswordForEmail(email, {
redirectTo: getResetRedirectUrl()
})

forgotPasswordBtn.style.pointerEvents = ""
forgotPasswordBtn.style.opacity = ""

if(error){
console.error("Reset password request failed:", error)
setFeedback("error", error.message || "Unable to send password reset email right now.")
return
}

setFeedback("success", "Password reset link sent. Check your email and open the link to create a new password.")
}catch(err){
console.error("Reset password request crashed:", err)
forgotPasswordBtn.style.pointerEvents = ""
forgotPasswordBtn.style.opacity = ""
setFeedback("error", "Unexpected error while sending reset email.")
}
})

form.addEventListener("submit", async (e)=>{
e.preventDefault()
clearFeedback()

const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value

try{
btn.disabled = true
googleBtn.disabled = true

if(mode==="login"){
await login(email,password)
}else{
await signup(email,password)
setFeedback("success", "Signup request submitted. Please check your email if confirmation is required.")
}
}catch(err){
console.error("Auth submit crashed:", err)
setFeedback("error", "Authentication failed. Please try again.")
}finally{
btn.disabled = false
googleBtn.disabled = false
}
})

googleBtn.addEventListener("click", async ()=>{
clearFeedback()

try{
googleBtn.disabled = true
btn.disabled = true
await googleLogin()
}catch(err){
console.error("Google login crashed:", err)
setFeedback("error", "Google login failed. Please try again.")
}finally{
googleBtn.disabled = false
btn.disabled = false
}
})

</script>

</body>
</html>

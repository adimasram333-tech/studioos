<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudioOS Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

.link{
color:#818cf8;
cursor:pointer;
}

</style>

</head>

<body class="text-white min-h-screen flex items-center justify-center">

<div class="glass p-8 rounded-2xl w-80">

<h2 id="title" class="text-xl font-bold mb-6 text-center">
StudioOS Login
</h2>


<form id="authForm">

<input
id="email"
type="email"
placeholder="Email"
class="w-full mb-4 p-3 rounded-lg bg-black/40"
required>

<input
id="password"
type="password"
placeholder="Password"
class="w-full mb-6 p-3 rounded-lg bg-black/40"
required>

<button
id="submitBtn"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg">
Login
</button>

</form>


<p class="text-center text-sm mt-4">

<span id="toggleText">
Don't have an account?
</span>

<span id="toggleBtn" class="link">
Signup
</span>

</p>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script type="module">

import { login, signup } from "./js/auth.js"

let mode = "login"

const form =
document.getElementById("authForm")

const title =
document.getElementById("title")

const btn =
document.getElementById("submitBtn")

const toggle =
document.getElementById("toggleBtn")

const text =
document.getElementById("toggleText")


// ======================
// TOGGLE LOGIN / SIGNUP
// ======================

toggle.addEventListener("click",()=>{

if(mode==="login"){

mode="signup"

title.innerText="Create Account"
btn.innerText="Signup"

text.innerText="Already have an account?"
toggle.innerText="Login"

}else{

mode="login"

title.innerText="StudioOS Login"
btn.innerText="Login"

text.innerText="Don't have an account?"
toggle.innerText="Signup"

}

})


// ======================
// FORM SUBMIT
// ======================

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const email =
document.getElementById("email").value

const password =
document.getElementById("password").value


if(mode==="login"){

await login(email,password)

}else{

await signup(email,password)

}

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudioOS Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body class="text-white min-h-screen flex items-center justify-center">

<div class="glass p-8 rounded-2xl w-80">

<h2 class="text-xl font-bold mb-6 text-center">
StudioOS Login
</h2>

<form id="loginForm">

<input
id="email"
type="email"
placeholder="Email"
class="w-full mb-4 p-3 rounded-lg bg-black/40"
required>

<input
id="password"
type="password"
placeholder="Password"
class="w-full mb-6 p-3 rounded-lg bg-black/40"
required>

<button
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg">
Login
</button>

</form>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script type="module">

import { login } from "./js/auth.js"

document
.getElementById("loginForm")
.addEventListener("submit", async (e)=>{

e.preventDefault()

const email =
document.getElementById("email").value

const password =
document.getElementById("password").value

await login(email,password)

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Sheet</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}
</style>

</head>

<body class="text-white min-h-screen p-4">

<div class="max-w-md mx-auto space-y-4">

<a href="client.html"
class="text-sm text-gray-400">
← Back
</a>

<h1 class="text-xl font-bold text-center">
Team Assignment Sheet
</h1>

<!-- HEADER -->

<div class="bg-white text-black rounded-xl p-4 space-y-3">

<div class="text-center">
<h2 class="text-lg font-bold" id="studioName">Studio Name</h2>
<p class="text-sm" id="studioPhone">Phone</p>
</div>

<hr>

<div class="space-y-1 text-sm">

<div class="flex justify-between">
<span>Client</span>
<span id="clientName">-</span>
</div>

<div class="flex justify-between">
<span>Event</span>
<span id="eventName">-</span>
</div>

<div class="flex justify-between">
<span>Date</span>
<span id="eventDate">-</span>
</div>

<div class="flex justify-between">
<span>Venue</span>
<span id="venue">-</span>
</div>

</div>

</div>


<!-- TEAM LIST -->

<div id="teamList" class="bg-white text-black rounded-xl p-4 space-y-4">

<p class="text-sm text-gray-500">Loading...</p>

</div>


<!-- ACTIONS -->

<div class="space-y-2">

<button onclick="downloadPDF()"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-xl text-sm font-semibold">
Download PDF
</button>

<button onclick="shareTeam()"
class="w-full bg-white/10 hover:bg-white/20 p-3 rounded-xl text-sm">
Share
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/team-sheet.js"></script>

</body>
</html>

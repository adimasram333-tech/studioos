<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Gallery</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

#galleryGrid{
content-visibility:auto;
contain-intrinsic-size:1200px;
}

#galleryGrid img{
background:rgba(255,255,255,0.06);
}

</style>

</head>

<body class="text-white min-h-screen p-4">

<div class="w-full max-w-6xl mx-auto mt-10">

<div class="glass rounded-2xl p-4 mb-4 flex justify-between items-center gap-2">

<h2 class="text-lg font-semibold">Event Gallery</h2>

<div class="flex items-center gap-2">
<button id="faceActionBtn"
class="hidden bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded-lg text-sm whitespace-nowrap">
Face Scan
</button>

<button id="uploadBtn"
class="bg-indigo-600 hover:bg-indigo-700 px-3 py-1 rounded-lg text-sm">
Upload
</button>
</div>

</div>

<div id="galleryGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3"></div>

<p id="emptyState" class="text-center text-gray-400 mt-6 hidden">
No photos uploaded
</p>

</div>

<!-- ============================= -->
<!-- SCRIPTS -->
<!-- ============================= -->

<script src="js/supabase.js"></script>

<!-- ✅ PAYMENT / DOWNLOAD DEPENDENCIES -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="js/downloadControl.js"></script>

<!-- ✅ SUPPORT MODULES LOAD BEFORE CORE GALLERY -->
<script src="js/gallery-token.js"></script>
<script src="js/gallery-delete.js"></script>

<!-- 🔥 CORE GALLERY LOADS LAST -->
<script src="js/gallery.js"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

const btn = document.getElementById("uploadBtn")

if(!btn){
return
}

btn.addEventListener("click", () => {

const params = new URLSearchParams(window.location.search)

const eventId = params.get("event_id")

if(!eventId){
alert("Please select an event first")
return
}

window.location.href = `gallery-upload.html?event_id=${encodeURIComponent(eventId)}`

})

})

</script>

</body>
</html>

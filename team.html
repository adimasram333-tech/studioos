<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Assignment</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}
.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body class="text-white min-h-screen p-4">

<div class="max-w-md mx-auto space-y-4">

<a href="clients.html"
class="text-sm text-gray-400">
← Back
</a>

<h1 class="text-xl font-bold">
Team Assignment
</h1>

<!-- CLIENT DETAILS -->

<div class="glass p-4 rounded-xl space-y-2">

<h2 class="text-sm font-semibold text-gray-300">
Client Details
</h2>

<div class="flex justify-between text-sm">
<span>Name</span>
<span id="clientName">-</span>
</div>

</div>


<!-- EVENT DETAILS -->

<div class="glass p-4 rounded-xl space-y-2">

<h2 class="text-sm font-semibold text-gray-300">
Event Details
</h2>

<div class="flex justify-between text-sm">
<span>Event</span>
<span id="eventName">-</span>
</div>

<div class="flex justify-between text-sm">
<span>Date</span>
<span id="eventDate">-</span>
</div>

<div class="flex justify-between text-sm">
<span>Venue</span>
<span id="venue">-</span>
</div>

</div>


<!-- ROLE + DAY -->

<div class="glass p-4 rounded-xl space-y-3">

<h2 class="text-sm font-semibold text-gray-300">
Team Role
</h2>

<div>
<label class="text-sm text-gray-400">Role</label>

<!-- ✅ FIXED DROPDOWN ONLY -->
<select id="role"
class="w-full mt-1 p-2 rounded-lg bg-white/10 text-white text-sm outline-none border border-white/10">

<option value="">Select Role</option>
<option>Candid Photographer</option>
<option>Traditional Photographer</option>
<option>Traditional Videographer</option>
<option>Cinematographer</option>
<option>Drone Operator</option>
<option>Assistant</option>
<option>LED Screen</option>

</select>

</div>

<div>
<label class="text-sm text-gray-400">Day</label>
<select id="day"
class="w-full mt-1 p-2 rounded-lg bg-white/10 text-white text-sm outline-none border border-white/10">
<option>Day 1</option>
<option>Day 2</option>
<option>Day 3</option>
</select>
</div>

</div>


<!-- MEMBERS -->

<div id="membersContainer" class="space-y-2"></div>


<!-- ACTIONS -->

<div class="space-y-2">

<button onclick="addMember()"
class="w-full glass p-3 rounded-xl hover:bg-white/10 text-sm">
+ Add Member
</button>

<button onclick="saveTeam()"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-xl text-sm font-semibold">
Save Team
</button>

</div>

</div>

<script src="js/supabase.js"></script>
<script src="js/team.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Assignment</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}
.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}
.dark-select{
color-scheme: dark;
-webkit-appearance: none;
appearance: none;
background-color: rgba(255,255,255,0.05);
color: white;
}
.dark-select option{
background-color: #0f172a;
color: white;
}
</style>

</head>

<body class="text-white min-h-screen p-4">

<div class="max-w-md mx-auto space-y-4">

<a href="clients.html"
class="text-sm text-gray-400">
← Back
</a>

<h1 class="text-xl font-bold">
Team Assignment
</h1>

<!-- CLIENT DETAILS -->

<div class="glass p-4 rounded-xl space-y-2">

<h2 class="text-sm font-semibold text-gray-300">
Client Details
</h2>

<div class="flex justify-between text-sm">
<span>Name</span>
<span id="clientName">-</span>
</div>

</div>


<!-- EVENT DETAILS -->

<div class="glass p-4 rounded-xl space-y-2">

<h2 class="text-sm font-semibold text-gray-300">
Event Details
</h2>

<div class="flex justify-between text-sm">
<span>Event</span>
<span id="eventName">-</span>
</div>

<div class="flex justify-between text-sm">
<span>Date</span>
<span id="eventDate">-</span>
</div>

<div class="flex justify-between text-sm">
<span>Venue</span>
<span id="venue">-</span>
</div>

</div>


<!-- ROLE + DAY -->

<div class="glass p-4 rounded-xl space-y-3">

<h2 class="text-sm font-semibold text-gray-300">
Team Role
</h2>

<div>
<label class="text-sm text-gray-400">Role</label>
<select id="role"
class="dark-select w-full mt-1 p-2 rounded-lg text-sm outline-none border border-white/10">
<option value="">Select Role</option>
<option value="Candid Photographer">Candid Photographer</option>
<option value="Traditional Photographer">Traditional Photographer</option>
<option value="Traditional Videographer">Traditional Videographer</option>
<option value="Cinematographer">Cinematographer</option>
<option value="Drone Operator">Drone Operator</option>
<option value="Assistant">Assistant</option>
<option value="LED Screen">LED Screen</option>
</select>
</div>

<div>
<label class="text-sm text-gray-400">Day</label>
<select id="day"
class="dark-select w-full mt-1 p-2 rounded-lg text-sm outline-none border border-white/10">
<option value="Day 1">Day 1</option>
<option value="Day 2">Day 2</option>
<option value="Day 3">Day 3</option>
</select>
</div>

</div>


<!-- MEMBER ENTRY -->

<div class="glass p-4 rounded-xl space-y-2">

<h2 class="text-sm font-semibold text-gray-300">
Member Details
</h2>

<div>
<label class="text-sm text-gray-400">Member Name</label>
<input id="memberName"
class="w-full mt-1 p-2 rounded-lg bg-white/10 text-white text-sm outline-none"
placeholder="Enter member name">
</div>

<div>
<label class="text-sm text-gray-400">Phone</label>
<input id="memberPhone"
class="w-full mt-1 p-2 rounded-lg bg-white/10 text-white text-sm outline-none"
placeholder="Enter phone number">
</div>

<div>
<label class="text-sm text-gray-400">Alt Phone</label>
<input id="memberAltPhone"
class="w-full mt-1 p-2 rounded-lg bg-white/10 text-white text-sm outline-none"
placeholder="Optional alternate number">
</div>

<div>
<label class="text-sm text-gray-400">Reporting Time</label>
<input id="memberReportingTime"
class="w-full mt-1 p-2 rounded-lg bg-white/10 text-white text-sm outline-none"
placeholder="e.g. 8:00 AM">
</div>

<div>
<label class="text-sm text-gray-400">Note</label>
<input id="memberNote"
class="w-full mt-1 p-2 rounded-lg bg-white/10 text-white text-sm outline-none"
placeholder="Optional note">
</div>

</div>


<!-- TEAM PREVIEW -->

<div class="glass p-4 rounded-xl space-y-3">

<div class="flex items-center justify-between">
  <h2 class="text-sm font-semibold text-gray-300">
    Added Team Members
  </h2>

  <div class="flex items-center gap-2">
    <button id="editTeamBtn"
      type="button"
      onclick="editTeam()"
      class="hidden text-xs text-indigo-400 hover:text-indigo-300">
      Edit
    </button>

    <span id="teamCount" class="text-xs text-gray-400">
      0 members
    </span>
  </div>
</div>

<div id="teamPreview" class="space-y-3 text-sm text-gray-300">
<p class="text-gray-400 text-sm">No members added yet</p>
</div>

</div>


<!-- ACTIONS -->

<div class="space-y-2">

<button id="addMemberBtn"
onclick="addMember()"
class="w-full glass p-3 rounded-xl hover:bg-white/10 text-sm">
+ Add Member
</button>

<button id="saveTeamBtn"
onclick="saveTeam()"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-xl text-sm font-semibold">
Save Team
</button>

<button onclick="viewTeamSheet()"
class="w-full glass p-3 rounded-xl hover:bg-white/10 text-sm">
View Team Sheet
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/team.js"></script>

</body>
</html>

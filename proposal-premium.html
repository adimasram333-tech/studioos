<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Proposal</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f172a;
font-family:'Inter',sans-serif;
color:#fff;
}

/* ===== HERO ===== */

.hero{
position:relative;
height:420px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

.hero::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom,rgba(0,0,0,0.5),rgba(0,0,0,0.7));
z-index:1;
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:42px;
}

.hero p{
margin-top:10px;
opacity:0.8;
}

/* ===== CARD ===== */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
border-radius:16px;
padding:20px;
}

/* ===== SECTION ===== */

.section{
margin-top:30px;
}

.section-title{
font-family:'Playfair Display',serif;
font-size:22px;
margin-bottom:10px;
}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.item{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

/* ===== FOOTER ===== */

.footer{
margin-top:40px;
text-align:center;
opacity:0.6;
font-size:12px;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

.hero{
height:300px;
}

.hero h1{
font-size:24px;
}

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- HERO -->

<div class="hero">

<img id="coverImage" src="team-sheet.jpg">

<div class="hero-content">
<h1 id="proposalTitle">Photography Proposal</h1>
<p id="studioName"></p>
<p id="studioPhone"></p>
</div>

</div>

<!-- CONTENT -->

<div class="max-w-3xl mx-auto p-4">

<!-- CLIENT INFO -->

<div class="card section">

<div class="grid">
<div class="item">
<span>Client</span>
<span id="clientName"></span>
</div>

<div class="item">
<span>Date</span>
<span id="eventDate"></span>
</div>
</div>

</div>

<!-- SERVICES -->

<div class="card section">

<h2 class="section-title">Services</h2>

<div class="grid">

<div class="item">
<span>Candid</span>
<span id="candidQty"></span>
</div>

<div class="item">
<span>Traditional</span>
<span id="traditionalPhotoQty"></span>
</div>

<div class="item">
<span>Video</span>
<span id="traditionalVideoQty"></span>
</div>

<div class="item">
<span>Cinematic</span>
<span id="cinemaQty"></span>
</div>

<div class="item">
<span>Drone</span>
<span id="droneQty"></span>
</div>

<div class="item">
<span>LED</span>
<span id="ledQty"></span>
</div>

<div class="item">
<span>Assistant</span>
<span id="assistantQty"></span>
</div>

</div>

</div>

<!-- DELIVERABLES -->

<div class="card section">

<h2 class="section-title">Deliverables</h2>
<ul id="deliverablesList"></ul>

</div>

<!-- PRICE -->

<div class="card section">

<h2 class="section-title">Investment</h2>

<div class="grid">
<div class="item"><span>Total</span><span id="total"></span></div>
<div class="item"><span>Advance</span><span id="advance"></span></div>
<div class="item"><span>Balance</span><span id="balance"></span></div>
</div>

</div>

<!-- ACTION -->

<div class="section text-center">

<button onclick="sendWhatsApp()" class="bg-green-500 px-6 py-3 rounded-lg mt-4">
Share on WhatsApp
</button>

<br>

<button onclick="downloadPDF()" class="bg-indigo-500 px-6 py-3 rounded-lg mt-3">
Download PDF
</button>

</div>

<!-- FOOTER -->

<div class="footer">
Generated by StudioOS
</div>

</div>

<script src="js/supabase.js"></script>
<script src="js/proposal-premium.js"></script>

</body>
</html>

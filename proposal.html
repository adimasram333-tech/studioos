<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photography Proposal</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
background:#f4f4f4;
margin:0;
font-family:'Inter',sans-serif;
}

.page{
width:210mm;
min-height:297mm;
background:white;
margin:40px auto;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

.hero{
height:240px;
background:url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
background-blend-mode:darken;
background-color:rgba(0,0,0,0.4);
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:32px;
margin:0;
}

.hero p{
margin-top:8px;
font-size:14px;
}

.content{
padding:50px;
}

.section-title{
font-family:'Playfair Display',serif;
font-size:20px;
margin-bottom:10px;
border-bottom:1px solid #eee;
padding-bottom:6px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.info-box{
background:#fafafa;
padding:15px;
border-left:3px solid #C6A348;
}

ul{
line-height:1.8;
}

.summary{
border:2px solid #C6A348;
padding:25px;
background:#faf7ef;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.footer{
margin-top:60px;
text-align:center;
font-size:13px;
color:#666;
}

</style>

</head>


<body>

<div class="page">

<div class="hero">

<h1>Wedding Photography Proposal</h1>

<p id="studioName"></p>

</div>

<div class="content">


<div class="info-grid">

<div class="info-box">

<strong>Prepared For:</strong>

<br>

<span id="clientName"></span>

</div>


<div class="info-box">

<strong>Event Date:</strong>

<br>

<span id="eventDate"></span>

</div>

</div>


<h2 class="section-title">Deliverables</h2>

<ul id="deliverablesList"></ul>


<div class="summary">

<h2 class="section-title">Investment Summary</h2>

<table>

<tr>
<td>Total Investment</td>
<td>₹ <span id="total"></span></td>
</tr>

<tr>
<td>Advance Required</td>
<td>₹ <span id="advance"></span></td>
</tr>

<tr>
<td>Balance</td>
<td>₹ <span id="balance"></span></td>
</tr>

</table>

</div>


<div class="footer">

<p>

Quotation generated using <strong>StudioOS</strong>

</p>

<p>

Professional Photography Business System

</p>

</div>


</div>

</div>


<script src="js/proposal.js"></script>

</body>
</html>

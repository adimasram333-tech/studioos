<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password - StudioOS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

.feedback{
display:none;
margin-top:1rem;
padding:0.85rem 1rem;
border-radius:0.85rem;
font-size:0.9rem;
line-height:1.5;
border:1px solid rgba(255,255,255,0.08);
}

.feedback.show{
display:block;
}

.feedback.info{
background:rgba(99,102,241,0.12);
border-color:rgba(99,102,241,0.3);
color:#c7d2fe;
}

.feedback.success{
background:rgba(34,197,94,0.12);
border-color:rgba(34,197,94,0.28);
color:#bbf7d0;
}

.feedback.error{
background:rgba(239,68,68,0.12);
border-color:rgba(239,68,68,0.28);
color:#fecaca;
}

</style>
</head>

<body class="text-white min-h-screen flex items-center justify-center px-4">

<div class="glass p-8 rounded-2xl w-full max-w-sm">
<h2 class="text-2xl font-bold text-center mb-2">Reset Password</h2>
<p class="text-sm text-white/70 text-center mb-6">
Enter your new password below to recover access to your StudioOS account.
</p>

<form id="resetForm">
<input
id="newPassword"
type="password"
placeholder="New Password"
class="w-full mb-4 p-3 rounded-lg bg-black/40"
required>

<input
id="confirmPassword"
type="password"
placeholder="Confirm New Password"
class="w-full mb-4 p-3 rounded-lg bg-black/40"
required>

<button
id="resetBtn"
type="submit"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg font-semibold">
Update Password
</button>
</form>

<div id="resetFeedback" class="feedback info"></div>

<div class="text-center mt-5">
<a href="index.html" class="text-sm text-indigo-300 hover:text-indigo-200 transition">← Back to Login</a>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script type="module">

function waitForSupabase(){
return new Promise(resolve=>{
const check = setInterval(()=>{
if(window.supabaseClient){
clearInterval(check)
resolve(window.supabaseClient)
}
},50)
})
}

function setFeedback(type, message){
const box = document.getElementById("resetFeedback")
box.className = "feedback show"

if(type === "success"){
box.classList.add("success")
}else if(type === "error"){
box.classList.add("error")
}else{
box.classList.add("info")
}

box.innerText = message
}

function clearFeedback(){
const box = document.getElementById("resetFeedback")
box.className = "feedback info"
box.innerText = ""
}

const supabase = await waitForSupabase()

const params = new URLSearchParams(window.location.search)
const accessToken = params.get("access_token")
const refreshToken = params.get("refresh_token")

if(accessToken && refreshToken){
const { error } = await supabase.auth.setSession({
access_token: accessToken,
refresh_token: refreshToken
})

if(error){
console.error("Reset session set failed:", error)
setFeedback("error", "Reset link is invalid or expired. Please request a new password reset email.")
}
}

const form = document.getElementById("resetForm")
const resetBtn = document.getElementById("resetBtn")
const newPassword = document.getElementById("newPassword")
const confirmPassword = document.getElementById("confirmPassword")

form.addEventListener("submit", async (e)=>{
e.preventDefault()
clearFeedback()

const password = newPassword.value
const confirm = confirmPassword.value

if(!password || password.length < 6){
setFeedback("error", "Password must be at least 6 characters long.")
newPassword.focus()
return
}

if(password !== confirm){
setFeedback("error", "Passwords do not match.")
confirmPassword.focus()
return
}

try{
resetBtn.disabled = true
resetBtn.innerText = "Updating..."

const { data: sessionData } = await supabase.auth.getSession()

if(!sessionData?.session){
setFeedback("error", "Recovery session not found. Please open the reset link directly from your email.")
resetBtn.disabled = false
resetBtn.innerText = "Update Password"
return
}

const { error } = await supabase.auth.updateUser({
password
})

resetBtn.disabled = false
resetBtn.innerText = "Update Password"

if(error){
console.error("Password update failed:", error)
setFeedback("error", error.message || "Unable to update password right now.")
return
}

setFeedback("success", "Password updated successfully. Redirecting to login...")

setTimeout(()=>{
window.location.replace("index.html")
}, 1800)

}catch(err){
console.error("Password update crashed:", err)
resetBtn.disabled = false
resetBtn.innerText = "Update Password"
setFeedback("error", "Unexpected error while updating password.")
}
})

</script>

</body>
</html>

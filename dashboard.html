<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudioOS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

.blur-dashboard{
filter: blur(6px);
pointer-events:none;
}

.stat-card{
cursor:pointer;
transition:transform .2s ease;
min-width: 0;
min-height: 112px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.stat-card:hover{
transform:scale(1.03);
}

.notification-item{
cursor:pointer;
transition:all .2s ease;
}

.notification-item:hover{
transform:translateX(5px);
color:white;
}

.stat-label{
font-size: 0.875rem;
line-height: 1.25rem;
color: rgb(156 163 175);
word-break: break-word;
}

.stat-value{
font-size: clamp(1.35rem, 4.5vw, 1.9rem);
line-height: 1.1;
font-weight: 700;
word-break: break-word;
overflow-wrap: anywhere;
margin-top: 10px;
}

@media (max-width: 360px){
.stat-card{
min-height: 104px;
padding: 0.875rem;
}
.stat-value{
font-size: 1.25rem;
}
}

</style>

</head>


<body class="text-white min-h-screen p-4 relative">

<div class="max-w-md mx-auto mb-4 flex justify-end">
<button
id="logoutBtn"
class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl text-sm">
Logout
</button>
</div>

<div id="dashboard" class="max-w-md mx-auto">

<div class="glass rounded-2xl p-4 flex justify-between items-center gap-3 mb-6">

<div class="min-w-0 flex-1">
<h1 id="studioDisplay" class="text-xl font-bold break-words">StudioOS</h1>
<p class="text-gray-400 text-xs">Photography Business System</p>
</div>

<a
id="setupBtn"
href="profile.html"
class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-xl text-sm shrink-0"
>
Setup
</a>

</div>


<div class="grid grid-cols-2 gap-4 mb-6">

<div onclick="location.href='clients.html'" class="glass rounded-2xl p-4 stat-card">
<p class="stat-label">Total Bookings</p>
<h2 id="totalBookings" class="stat-value">0</h2>
</div>

<div onclick="location.href='pending-payments.html'" class="glass rounded-2xl p-4 stat-card">
<p class="stat-label">Pending Payments</p>
<h2 id="pendingPayments" class="stat-value">₹0</h2>
</div>

<div onclick="location.href='monthly-revenue.html'" class="glass rounded-2xl p-4 stat-card col-span-2">
<p class="stat-label">Monthly Revenue</p>
<h2 id="monthlyRevenue" class="stat-value">₹0</h2>
</div>

</div>


<div class="glass rounded-2xl p-4 mb-6">

<div class="flex justify-between items-center mb-3 gap-3">

<h3 class="text-lg font-semibold">
Recent Quotations
</h3>

<a href="quotations.html"
class="text-indigo-400 text-sm hover:underline shrink-0">
View All →
</a>

</div>

<div id="recentQuotations" class="space-y-2 text-sm text-gray-300">

<p class="text-gray-400">No quotations yet</p>

</div>

</div>


<div class="glass rounded-2xl p-4 mb-6">

<h3 class="text-lg font-semibold mb-3">
Notifications
</h3>

<div id="notifications" class="space-y-2 text-sm text-gray-300">

<p class="text-gray-400">No notifications</p>

</div>

</div>



<div class="space-y-4">

<a href="quotation.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
📄 Quotations
</a>

<a href="clients.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
👤 Clients
</a>

<a href="gallery-upload.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
📦 Upload Photos
</a>

<!-- ✅ NEW BUTTON ADDED -->
<a href="gallery.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
🖼 Gallery
</a>

<a href="earnings.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
💰 Earnings
</a>

<a href="events.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
📅 Events
</a>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script type="module">

import { protectPage, logout } from "./js/auth.js"


// =============================
// GET CURRENT USER (FIXED)
// =============================

async function getCurrentUser(){

const supabase = await window.getSupabase()

const { data:{ user } } =
await supabase.auth.getUser()

return user

}


// =============================
// PROTECT PAGE
// =============================

await protectPage()

document
.getElementById("logoutBtn")
.addEventListener("click", logout)



// =============================
// FORMAT CURRENCY
// =============================

function formatCurrency(value){

const amount = Number(value || 0)

return "₹" + amount.toLocaleString("en-IN")

}



// =============================
// LOAD STUDIO
// =============================

async function loadStudio(){

const supabase = await window.getSupabase()

const user = await getCurrentUser()

if(!user) return

const { data } =
await supabase
.from("photographer_settings")
.select("studio_name")
.eq("user_id", user.id)
.single()

if(data){
document.getElementById("studioDisplay").innerText =
data.studio_name
}

}

loadStudio()



// =============================
// LOAD DASHBOARD
// =============================

async function loadDashboard(){

const supabase = await window.getSupabase()

const user = await getCurrentUser()

if(!user) return



// RECENT QUOTATIONS

const { data: quotations } =
await supabase
.from("quotations")
.select("id,client_name,total,created_at")
.eq("user_id", user.id)
.order("created_at",{ascending:false})
.limit(3)

const list =
document.getElementById("recentQuotations")

if(quotations && quotations.length){

list.innerHTML = ""

quotations.forEach(q=>{

const date =
new Date(q.created_at)
.toLocaleDateString("en-IN")

const row =
document.createElement("div")

row.innerHTML =
`
<div class="flex justify-between gap-3">
<div class="min-w-0">
<div class="break-words">${q.client_name}</div>
<div class="text-xs text-gray-400">${date}</div>
</div>
<span class="shrink-0 break-words">${formatCurrency(q.total)}</span>
</div>
`

list.appendChild(row)

})

}



// TOTAL BOOKINGS

const { count } =
await supabase
.from("quotations")
.select("*",{count:"exact",head:true})
.eq("user_id", user.id)
.eq("status","confirmed")

document.getElementById("totalBookings").innerText =
count || 0



// PAYMENTS + REVENUE

const { data: allQuotes } =
await supabase
.from("quotations")
.select("id,total")
.eq("user_id", user.id)
.eq("status","confirmed")

const { data: allPayments } =
await supabase
.from("payments")
.select("*")
.eq("user_id", user.id)



let pending = 0
let monthlyRevenue = 0

const now = new Date()
const currentMonth = now.getMonth()
const currentYear = now.getFullYear()



allPayments?.forEach(p=>{

const payDate = new Date(p.payment_date)

if(
payDate.getMonth() === currentMonth &&
payDate.getFullYear() === currentYear
){
monthlyRevenue += Number(p.amount || 0)
}

})



for(const q of allQuotes){

const payments =
allPayments?.filter(p=>p.quotation_id === q.id) || []

let paid = 0

payments.forEach(p=>{
paid += Number(p.amount || 0)
})

const remaining = q.total - paid

if(remaining > 0){
pending += remaining
}

}



document.getElementById("pendingPayments").innerText =
formatCurrency(pending)

document.getElementById("monthlyRevenue").innerText =
formatCurrency(monthlyRevenue)



// NOTIFICATIONS

const { data: events } =
await supabase
.from("quotations")
.select("client_name,event_date,status")
.eq("user_id", user.id)
.eq("status","confirmed")

const notify =
document.getElementById("notifications")

notify.innerHTML = ""

const today = new Date()

let shown = 0

events?.forEach(e=>{

if(shown >= 3) return

const eventDate =
new Date(e.event_date)

const diff =
Math.ceil(
(eventDate - today)/(1000*60*60*24)
)

let text = ""

if(diff === 0){
text = `📅 ${e.client_name} event today`
}
else if(diff === 1){
text = `📅 ${e.client_name} event tomorrow`
}
else if(diff <= 3 && diff > 1){
text = `📅 ${e.client_name} event in ${diff} days`
}

if(text){

const div = document.createElement("div")

div.className = "notification-item"

div.onclick = () => location.href = "clients.html"

div.innerText = text

notify.appendChild(div)

shown++

}

})

if(notify.innerHTML === ""){
notify.innerHTML =
"<p class='text-gray-400'>No reminders</p>"
}

}

loadDashboard()

</script>

</body>
</html>

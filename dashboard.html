<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudioOS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

.blur-dashboard{
filter: blur(6px);
pointer-events:none;
}

</style>

</head>


<body class="text-white min-h-screen p-4 relative">

<div class="max-w-md mx-auto mb-4 flex justify-end">
<button
id="logoutBtn"
class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl text-sm">
Logout
</button>
</div>

<div id="dashboard" class="max-w-md mx-auto">

<div class="glass rounded-2xl p-4 flex justify-between items-center mb-6">

<div>
<h1 id="studioDisplay" class="text-xl font-bold">StudioOS</h1>
<p class="text-gray-400 text-xs">Photography Business System</p>
</div>

<a
id="setupBtn"
href="profile.html"
class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-xl text-sm"
>
Setup
</a>

</div>


<div class="grid grid-cols-3 gap-4 mb-6">

<div class="glass rounded-2xl p-4">
<p class="text-gray-400 text-sm">Total Bookings</p>
<h2 id="totalBookings" class="text-2xl font-bold">0</h2>
</div>

<div class="glass rounded-2xl p-4">
<p class="text-gray-400 text-sm">Pending Payments</p>
<h2 id="pendingPayments" class="text-2xl font-bold">₹0</h2>
</div>

<div class="glass rounded-2xl p-4">
<p class="text-gray-400 text-sm">Monthly Revenue</p>
<h2 id="monthlyRevenue" class="text-2xl font-bold">₹0</h2>
</div>

</div>


<!-- RECENT QUOTATIONS -->

<div class="glass rounded-2xl p-4 mb-6">

<div class="flex justify-between items-center mb-3">

<h3 class="text-lg font-semibold">
Recent Quotations
</h3>

<a href="quotations.html"
class="text-indigo-400 text-sm hover:underline">
View All →
</a>

</div>

<div id="recentQuotations" class="space-y-2 text-sm text-gray-300">

<p class="text-gray-400">No quotations yet</p>

</div>

</div>


<!-- NOTIFICATIONS -->

<div class="glass rounded-2xl p-4 mb-6">

<h3 class="text-lg font-semibold mb-3">
Notifications
</h3>

<div id="notifications" class="space-y-2 text-sm text-gray-300">

<p class="text-gray-400">No notifications</p>

</div>

</div>



<div class="space-y-4">

<a href="quotation.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
📄 Quotations
</a>

<a href="invoices.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
🧾 Invoices
</a>

<a href="packages.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
📦 Packages
</a>

<a href="events.html"
class="block glass rounded-2xl p-4 hover:scale-105 transition">
📅 Events
</a>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script type="module">

import { protectPage, logout } from "./js/auth.js"

await protectPage()

document
.getElementById("logoutBtn")
.addEventListener("click", logout)



// LOAD STUDIO NAME

async function loadStudio(){

const { data: userData } =
await supabase.auth.getUser()

const user = userData.user

if(!user) return

const { data } =
await supabase
.from("photographer_settings")
.select("studio_name")
.eq("user_id", user.id)
.single()

if(data){
document.getElementById("studioDisplay").innerText =
data.studio_name
}

}

loadStudio()



// DASHBOARD DATA

async function loadDashboard(){

const { data: userData } =
await supabase.auth.getUser()

const user = userData.user

if(!user) return



// RECENT QUOTATIONS

const { data: quotations } =
await supabase
.from("quotations")
.select("id,client_name,total,created_at")
.eq("user_id", user.id)
.order("created_at",{ascending:false})
.limit(3)

const list =
document.getElementById("recentQuotations")

if(quotations && quotations.length){

list.innerHTML = ""

quotations.forEach(q=>{

const date =
new Date(q.created_at)
.toLocaleDateString("en-IN")

const row =
document.createElement("div")

row.innerHTML =
`
<div class="flex justify-between">
<div>
<div>${q.client_name}</div>
<div class="text-xs text-gray-400">${date}</div>
</div>
<span>₹${q.total}</span>
</div>
`

list.appendChild(row)

})

}



// BOOKINGS COUNT

const { count } =
await supabase
.from("quotations")
.select("*",{count:"exact",head:true})
.eq("user_id", user.id)
.eq("status","confirmed")

document.getElementById("totalBookings").innerText =
count || 0



// GET CONFIRMED BOOKINGS

const { data: allQuotes } =
await supabase
.from("quotations")
.select("id,total")
.eq("user_id", user.id)
.eq("status","confirmed")

let pending = 0
let monthlyRevenue = 0

const now = new Date()
const currentMonth = now.getMonth()
const currentYear = now.getFullYear()

for(const q of allQuotes){

const { data: payments } =
await supabase
.from("payments")
.select("amount,payment_date")
.eq("quotation_id", q.id)

let paid = 0

payments?.forEach(p=>{

paid += Number(p.amount || 0)

const payDate = new Date(p.payment_date)

if(
payDate.getMonth() === currentMonth &&
payDate.getFullYear() === currentYear
){
monthlyRevenue += Number(p.amount || 0)
}

})

const remaining = q.total - paid

if(remaining > 0){
pending += remaining
}

}

document.getElementById("pendingPayments").innerText =
"₹" + pending

document.getElementById("monthlyRevenue").innerText =
"₹" + monthlyRevenue



// EVENT REMINDERS

const { data: events } =
await supabase
.from("quotations")
.select("client_name,event_date,status")
.eq("user_id", user.id)
.eq("status","confirmed")

const notify =
document.getElementById("notifications")

notify.innerHTML = ""

const today = new Date()

events?.forEach(e=>{

const eventDate =
new Date(e.event_date)

const diff =
Math.ceil(
(eventDate - today)/(1000*60*60*24)
)

if(diff === 0){

notify.innerHTML +=
`<div>📅 ${e.client_name} event today</div>`

}

else if(diff === 1){

notify.innerHTML +=
`<div>📅 ${e.client_name} event tomorrow</div>`

}

else if(diff <= 3 && diff > 1){

notify.innerHTML +=
`<div>📅 ${e.client_name} event in ${diff} days</div>`

}

})

if(notify.innerHTML === ""){
notify.innerHTML =
"<p class='text-gray-400'>No reminders</p>"
}

}

loadDashboard()

</script>

</body>
</html>

body{

.glass{

.blur-dashboard{
filter: blur(6px);

.stat-card{

padding:0.875rem;

transform:scale(1.03);

.notification-item{

transition:all .2s ease;

.notification-item:hover{
transform:translateX(5px);

}

.stat-label{
font-size:0.875rem;
line-height:1.2;
color:rgb(156 163 175);
word-break:break-word;
}

.stat-value{
font-size:clamp(1.05rem,4vw,1.55rem);
line-height:1.1;
font-weight:700;
word-break:break-word;
overflow-wrap:anywhere;
margin-top:8px;
}

.stat-card-wide{
min-height:80px;
}

.menu-wrapper{
position:relative;
}

.menu-btn{
display:flex;
align-items:center;
justify-content:center;
width:42px;
height:42px;
border-radius:0.75rem;
background: rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
font-size:1.25rem;
line-height:1;
}

.menu-btn:hover{
background: rgba(255,255,255,0.1);
}

.dropdown-menu{
position:absolute;
top:calc(100% + 8px);
right:0;
min-width:180px;
padding:0.5rem;
border-radius:1rem;
background: rgba(15,23,42,0.96);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 12px 30px rgba(0,0,0,0.28);
z-index:50;
}

.dropdown-menu.hidden{
display:none;
}

.menu-item{
display:block;
width:100%;
text-align:left;
padding:0.75rem 0.9rem;
border-radius:0.75rem;
font-size:0.95rem;
color:white;
background:transparent;
transition:background .2s ease;
}

.menu-item:hover{
background: rgba(255,255,255,0.08);
}

.menu-item-danger{
color:#fca5a5;
}

.app-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:0.75rem;
}

.app-brand{
display:flex;
align-items:center;
gap:0.75rem;
min-width:0;
}

.app-logo{
width:40px;
height:40px;
border-radius:0.85rem;
object-fit:cover;
display:none;
border:1px solid rgba(255,255,255,0.1);
background: rgba(255,255,255,0.05);
}

.app-title{
font-family:"Poppins", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
font-size:clamp(1.9rem,6vw,2.3rem);
line-height:1;
font-weight:800;
word-break:break-word;
letter-spacing:-0.03em;
text-rendering:optimizeLegibility;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
}

@media (min-width: 640px){
.stat-card{
padding:1rem;
min-height:100px;
}
.stat-card-wide{
min-height:92px;
}
.stat-value{
font-size:clamp(1.2rem,3vw,1.75rem);
}
}

@media (max-width: 360px){
.stat-card{
padding:0.75rem;
min-height:80px;
}
.stat-card-wide{
min-height:76px;
}
.stat-label{
font-size:0.8rem;
}
.stat-value{
font-size:1rem;
margin-top:6px;
}
.menu-btn{
width:40px;
height:40px;
}
.app-logo{
width:36px;
height:36px;
}
.app-title{
font-size:1.8rem;
}
}

</style>

</head>


<body class="text-white min-h-screen p-4 relative">

<!-- TOP APP HEADER -->

<div class="app-brand">

id="appLogo"

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script type="module">

import { protectPage, logout } from "./js/auth.js"


// =============================
// GET CURRENT USER (FIXED)
// =============================

async function getCurrentUser(){

const supabase = await window.getSupabase()

const { data:{ user } } =
await supabase.auth.getUser()

return user

}


// =============================
// PROTECT PAGE
// =============================

await protectPage()

document
.getElementById("logoutBtn")
.addEventListener("click", logout)


// =============================
// MENU LOGIC
// =============================

const menuBtn =
document.getElementById("menuBtn")

const dashboardMenu =
document.getElementById("dashboardMenu")

const websiteBuilderBtn =
document.getElementById("websiteBuilderBtn")

menuBtn.addEventListener("click",(e)=>{

e.stopPropagation()

const isHidden =
dashboardMenu.classList.contains("hidden")

if(isHidden){
dashboardMenu.classList.remove("hidden")
menuBtn.setAttribute("aria-expanded","true")
}else{
dashboardMenu.classList.add("hidden")
menuBtn.setAttribute("aria-expanded","false")
}

})

document.addEventListener("click",(e)=>{

if(
!dashboardMenu.contains(e.target) &&
!menuBtn.contains(e.target)
){
dashboardMenu.classList.add("hidden")
menuBtn.setAttribute("aria-expanded","false")
}

})

websiteBuilderBtn.addEventListener("click",(e)=>{

e.preventDefault()
dashboardMenu.classList.add("hidden")
menuBtn.setAttribute("aria-expanded","false")
alert("Website Builder will be added for paid users.")

})


// =============================
// FORMAT CURRENCY
// =============================

function formatCurrency(value){

const amount = Number(value || 0)

return "₹" + amount.toLocaleString("en-IN")

}



// =============================
// ENSURE PHOTOGRAPHER SETTINGS
// =============================

async function ensurePhotographerSettings(){

const supabase = await window.getSupabase()

const user = await getCurrentUser()

if(!user) return null

const { data: existing, error: fetchError } =
await supabase
.from("photographer_settings")
.select("id,studio_name")
.eq("user_id", user.id)
.maybeSingle()

if(fetchError){
console.error("Photographer settings fetch failed:", fetchError)
return null
}

if(existing){
return existing
}

const insertPayload = {
user_id: user.id
}

const { data: inserted, error: insertError } =
await supabase
.from("photographer_settings")
.insert([insertPayload])
.select("id,studio_name")
.single()

if(insertError){
console.error("Photographer settings auto-create failed:", insertError)

const { data: retryData, error: retryError } =
await supabase
.from("photographer_settings")
.select("id,studio_name")
.eq("user_id", user.id)
.maybeSingle()

if(retryError){
console.error("Photographer settings retry fetch failed:", retryError)
return null
}

return retryData || null
}

return inserted || null

}



// =============================
// LOAD STUDIO
// =============================

async function loadStudio(){

const settings = await ensurePhotographerSettings()

if(settings?.studio_name){
document.getElementById("studioDisplay").innerText =
settings.studio_name
}

}

loadStudio()



// =============================
// LOAD DASHBOARD
// =============================

async function loadDashboard(){

const supabase = await window.getSupabase()

const user = await getCurrentUser()

if(!user) return



// RECENT QUOTATIONS

const { data: quotations } =
await supabase
.from("quotations")
.select("id,client_name,total,created_at")
.eq("user_id", user.id)
.order("created_at",{ascending:false})
.limit(3)

const list =
document.getElementById("recentQuotations")

if(quotations && quotations.length){

list.innerHTML = ""

quotations.forEach(q=>{

const date =
new Date(q.created_at)
.toLocaleDateString("en-IN")

const row =
document.createElement("div")

row.innerHTML =
`
<div class="flex justify-between gap-3">
<div class="min-w-0">
<div class="break-words">${q.client_name}</div>
<div class="text-xs text-gray-400">${date}</div>
</div>
<span class="shrink-0 break-words">${formatCurrency(q.total)}</span>
</div>
`

list.appendChild(row)

})

}



// TOTAL BOOKINGS

const { count } =
await supabase
.from("quotations")
.select("*",{count:"exact",head:true})
.eq("user_id", user.id)
.eq("status","confirmed")

document.getElementById("totalBookings").innerText =
count || 0



// PAYMENTS + REVENUE

const { data: allQuotes } =
await supabase
.from("quotations")
.select("id,total")
.eq("user_id", user.id)
.eq("status","confirmed")

const { data: allPayments } =
await supabase
.from("payments")
.select("*")
.eq("user_id", user.id)



let pending = 0
let monthlyRevenue = 0

const now = new Date()
const currentMonth = now.getMonth()
const currentYear = now.getFullYear()



allPayments?.forEach(p=>{

const payDate = new Date(p.payment_date)

if(
payDate.getMonth() === currentMonth &&
payDate.getFullYear() === currentYear
){
monthlyRevenue += Number(p.amount || 0)
}

})



for(const q of (allQuotes || [])){

const payments =
allPayments?.filter(p=>p.quotation_id === q.id) || []

let paid = 0

payments.forEach(p=>{
paid += Number(p.amount || 0)
})

const remaining = Number(q.total || 0) - paid

if(remaining > 0){
pending += remaining
}

}



document.getElementById("pendingPayments").innerText =
formatCurrency(pending)

document.getElementById("monthlyRevenue").innerText =
formatCurrency(monthlyRevenue)



// NOTIFICATIONS

const { data: events } =
await supabase
.from("quotations")
.select("client_name,event_date,status")
.eq("user_id", user.id)
.eq("status","confirmed")

const notify =
document.getElementById("notifications")

notify.innerHTML = ""

const today = new Date()

let shown = 0

events?.forEach(e=>{

if(shown >= 3) return

const eventDate =
new Date(e.event_date)

const diff =
Math.ceil(
(eventDate - today)/(1000*60*60*24)
)

let text = ""

if(diff === 0){
text = `📅 ${e.client_name} event today`
}
else if(diff === 1){
text = `📅 ${e.client_name} event tomorrow`
}
else if(diff <= 3 && diff > 1){
text = `📅 ${e.client_name} event in ${diff} days`
}

if(text){

const div = document.createElement("div")

div.className = "notification-item"

div.onclick = () => location.href = "clients.html"

div.innerText = text

notify.appendChild(div)

shown++

}

})

if(notify.innerHTML === ""){
notify.innerHTML =
"<p class='text-gray-400'>No reminders</p>"
}

}

loadDashboard()

</script>

</body>

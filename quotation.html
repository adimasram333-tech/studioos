<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Quotation</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

</style>

</head>


<body class="text-white min-h-screen flex justify-center items-center">

<div class="glass p-8 rounded-2xl w-[420px]">

<a href="index.html" class="text-gray-400 text-sm">← Back</a>

<h1 class="text-xl font-bold mt-2 mb-6">Create Quotation</h1>


<input id="clientName"
class="w-full mb-3 p-3 rounded-xl bg-slate-800"
placeholder="Client Name">

<input id="clientPhone"
class="w-full mb-3 p-3 rounded-xl bg-slate-800"
placeholder="Client Phone">


<select id="eventCategory"
class="w-full mb-3 p-3 rounded-xl bg-slate-800">

<option value="">Select Event Category</option>

<option>Wedding</option>
<option>Pre Wedding</option>
<option>Engagement</option>
<option>Birthday</option>
<option>Other</option>

</select>


<div class="flex gap-2 mb-3">

<input id="startDate"
type="date"
class="w-full p-3 rounded-xl bg-slate-800">

<input id="endDate"
type="date"
class="w-full p-3 rounded-xl bg-slate-800">

</div>


<select id="packageSelect"
class="w-full mb-4 p-3 rounded-xl bg-slate-800">

<option value="">Select Package</option>

<option value="silver">Silver</option>
<option value="gold">Gold</option>
<option value="platinum">Platinum</option>

</select>


<p class="font-semibold mb-2">Deliverables</p>

<div class="grid grid-cols-2 gap-2 mb-4 text-sm">

<label><input type="checkbox" value="Raw Soft Copy"> Raw Soft Copy</label>
<label><input type="checkbox" value="Traditional Video"> Traditional Video</label>
<label><input type="checkbox" value="Cinematic Highlight"> Cinematic Highlight</label>
<label><input type="checkbox" value="Printed Album"> Printed Album</label>
<label><input type="checkbox" value="Free Gift"> Free Gift</label>

</div>


<input id="totalAmount"
class="w-full mb-3 p-3 rounded-xl bg-slate-800"
placeholder="Total ₹">

<input id="advanceAmount"
class="w-full mb-3 p-3 rounded-xl bg-slate-800"
placeholder="Advance ₹">

<input id="balanceAmount"
class="w-full mb-4 p-3 rounded-xl bg-slate-800"
placeholder="Balance ₹"
readonly>


<button id="previewBtn"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-xl">

Preview Quote

</button>


</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/storage.js"></script>

<script src="js/packages.js"></script>

<script src="js/quotation.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Quotation</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.1);
}

.input{
width:100%;
padding:10px;
border-radius:10px;
background:#374151;
margin-bottom:8px;
color:white;
border:1px solid rgba(255,255,255,0.1);
}

.deliverable{
display:block;
margin-top:6px;
}

.serviceRow{
display:flex;
align-items:center;
margin-bottom:10px;
gap:10px;
}

.serviceRow span{
width:160px;
font-size:14px;
}

.serviceInput{
width:55px;
height:32px;
background:#1f2937;
border:1px solid rgba(255,255,255,0.2);
border-radius:6px;
color:white;
text-align:center;
outline:none;
}

.serviceInput::-webkit-outer-spin-button,
.serviceInput::-webkit-inner-spin-button{
-webkit-appearance:none;
margin:0;
}

.serviceInput[type=number]{
-moz-appearance:textfield;
background:#1f2937;
color:white;
}

.serviceInput:focus{
border-color:#6366f1;
}

.serviceHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px;
}

.serviceHeader .blank{
width:160px;
}

.serviceHeader span{
width:55px;
text-align:center;
font-size:12px;
color:#9ca3af;
}

</style>

</head>

<body class="text-white min-h-screen flex items-center justify-center p-6">

<div class="glass p-6 rounded-2xl w-[460px]">

<a href="index.html" class="text-sm text-gray-400">← Back</a>

<h1 class="text-xl font-bold mt-2 mb-6">Create Quotation</h1>

<input id="clientName" class="input" placeholder="Client Name">
<input id="clientPhone" class="input" placeholder="Client Phone">

<select id="eventCategory" class="input">
<option value="">Select Event Category</option>
<option>Wedding</option>
<option>Pre Wedding</option>
<option>Engagement</option>
<option>Haldi</option>
<option>Mehndi</option>
<option>Sangeet</option>
<option>Reception</option>
<option>Birthday</option>
<option>Maternity</option>
<option>Corporate Event</option>
<option>Other</option>
</select>

<div class="flex gap-2">
<input id="startDate" type="date" class="input">
<input id="endDate" type="date" class="input">
</div>

<select id="packageSelect" class="input">
<option value="">Select Package</option>
<option value="50000">Silver</option>
<option value="80000">Gold</option>
<option value="120000">Platinum</option>
</select>

<hr class="my-3 border-gray-600">

<h3 class="font-semibold mb-2">Services & Coverage</h3>

<div class="serviceHeader">
<div class="blank"></div>
<span>Qty</span>
<span>Days</span>
</div>

<div class="serviceRow">
<span>Candid Photographer</span>
<input id="candidQty" type="number" min="0" value="0" class="serviceInput">
<input id="candidDays" type="number" min="0" value="0" class="serviceInput">
</div>

<div class="serviceRow">
<span>Traditional Photographer</span>
<input id="traditionalPhotoQty" type="number" min="0" value="0" class="serviceInput">
<input id="traditionalPhotoDays" type="number" min="0" value="0" class="serviceInput">
</div>

<div class="serviceRow">
<span>Traditional Videographer</span>
<input id="traditionalVideoQty" type="number" min="0" value="0" class="serviceInput">
<input id="traditionalVideoDays" type="number" min="0" value="0" class="serviceInput">
</div>

<div class="serviceRow">
<span>Cinematographer</span>
<input id="cinemaQty" type="number" min="0" value="0" class="serviceInput">
<input id="cinemaDays" type="number" min="0" value="0" class="serviceInput">
</div>

<div class="serviceRow">
<span>Drone</span>
<input id="droneQty" type="number" min="0" value="0" class="serviceInput">
<input id="droneDays" type="number" min="0" value="0" class="serviceInput">
</div>

<div class="serviceRow">
<span>LED Screen Wall</span>
<input id="ledQty" type="number" min="0" value="0" class="serviceInput">
<input id="ledDays" type="number" min="0" value="0" class="serviceInput">
</div>

<div class="serviceRow">
<span>Assistant</span>
<input id="assistantQty" type="number" min="0" value="0" class="serviceInput">
<input id="assistantDays" type="number" min="0" value="0" class="serviceInput">
</div>

<hr class="my-3 border-gray-600">

<h3 class="font-semibold mb-2">Deliverables</h3>

<label class="deliverable">
<input type="checkbox" id="rawCheck"> Raw Soft Copy
</label>

<label class="deliverable">
<input type="checkbox" id="traditionalCheck"> Traditional Video (Full Event)
</label>

<label class="deliverable">
<input type="checkbox" id="cinematicCheck"> Cinematic Highlight
</label>

<label class="deliverable">
<input type="checkbox" id="albumCheck"> Printed Album
</label>

<input id="albumPagesInput" type="number" placeholder="Album Pages" class="input hidden">

<label class="deliverable">
<input type="checkbox" id="giftCheck"> Free Gift
</label>

<input id="giftInput" type="text" placeholder="Gift Name" class="input hidden">

<hr class="my-3 border-gray-600">

<input id="totalAmount" class="input" placeholder="Total ₹">
<input id="advanceAmount" class="input" placeholder="Advance ₹">
<input id="balanceAmount" class="input" placeholder="Balance ₹" readonly>

<button id="previewBtn"
class="w-full bg-indigo-600 p-3 rounded-xl mt-2 hover:bg-indigo-500 transition">
Preview Quote
</button>

</div>


<!-- SUPABASE LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- SUPABASE CONNECTION -->
<script src="js/supabase.js"></script>

<!-- PACKAGES ENGINE -->
<script src="js/packages.js"></script>

<!-- QUOTATION ENGINE -->
<script src="js/quotation.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Quotation - StudioOS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
}

.card{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.1);
}

input,select{
background: rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
color:white;
}

select option{
background:#0f172a;
color:white;
}

</style>

</head>


<body class="text-white min-h-screen p-6">

<div class="max-w-md mx-auto">

<a href="index.html" class="text-sm text-gray-400">← Back</a>

<h1 class="text-2xl font-bold mt-4 mb-6">
Create Quotation
</h1>


<div class="card p-6 rounded-2xl space-y-4">

<input id="clientName" class="w-full p-3 rounded-xl" placeholder="Client Name">

<input id="clientPhone" class="w-full p-3 rounded-xl" placeholder="Client Phone">


<select id="eventCategory" class="w-full p-3 rounded-xl">
<option value="">Select Event Category</option>
<option>Wedding</option>
<option>Pre Wedding</option>
<option>Engagement</option>
<option>Reception</option>
<option>Birthday</option>
<option>Baby Shower</option>
<option>Other Event</option>
</select>


<div class="grid grid-cols-2 gap-2">

<input id="eventStartDate" type="date" class="p-3 rounded-xl">

<input id="eventEndDate" type="date" class="p-3 rounded-xl">

</div>


<select id="packageSelect" class="w-full p-3 rounded-xl">

<option value="">Select Package</option>

<option>Silver</option>
<option>Gold</option>
<option>Platinum</option>
<option>Custom Package</option>

</select>


<!-- DELIVERABLES -->

<div class="border-t border-white/20 pt-4 space-y-2">

<h2 class="font-semibold text-lg">Deliverables</h2>

<label>
<input type="checkbox" id="softCopy">
All Raw Soft Copy
</label>

<label>
<input type="checkbox" id="traditionalVideo">
Traditional Video (Full Event)
</label>

<label>
<input type="checkbox" id="cinematicHighlight">
Cinematic Highlight
</label>

<label>
<input type="checkbox" id="printedAlbum">
Printed Album
</label>

<input
id="albumSheets"
type="number"
placeholder="Album Sheets"
class="w-full p-2 rounded-xl hidden"
>

<label>
<input type="checkbox" id="freeGift">
Free Gift
</label>

<input
id="giftName"
type="text"
placeholder="Gift Name"
class="w-full p-2 rounded-xl hidden"
>

</div>


<input
id="totalAmount"
type="number"
placeholder="Total ₹"
class="w-full p-3 rounded-xl"
>

<input
id="advanceAmount"
type="number"
placeholder="Advance ₹"
class="w-full p-3 rounded-xl"
>

<input
id="balanceAmount"
type="number"
placeholder="Balance ₹"
class="w-full p-3 rounded-xl"
readonly
>


<button
id="previewBtn"
class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-xl font-semibold"
>

Preview Quote

</button>


</div>

</div>


<!-- IMPORTANT SCRIPT ORDER -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/storage.js"></script>

<script src="js/packages.js"></script>

<script src="js/quotation.js"></script>


<script>

/* SHOW ALBUM INPUT */

document.getElementById("printedAlbum").addEventListener("change",function(){

document.getElementById("albumSheets").classList.toggle("hidden",!this.checked)

})


/* SHOW GIFT INPUT */

document.getElementById("freeGift").addEventListener("change",function(){

document.getElementById("giftName").classList.toggle("hidden",!this.checked)

})


/* BALANCE CALCULATION */

document.getElementById("advanceAmount").addEventListener("input",function(){

let total=parseFloat(document.getElementById("totalAmount").value)||0
let advance=parseFloat(this.value)||0

document.getElementById("balanceAmount").value=total-advance

})

</script>


</body>
</html>
